<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NBA Playoff Analyzer — Advanced Edition</title>
<style>
  :root {
    --bg: #0a0e1a;
    --card: #131829;
    --card-hover: #1a2038;
    --accent: #4f8cff;
    --accent2: #ff6b4f;
    --green: #3dd68c;
    --yellow: #ffc73a;
    --red: #ff4f5e;
    --text: #e8eaf0;
    --text-dim: #8a8fa8;
    --border: #262d45;
    --glass: rgba(19,24,41,0.85);
    /* Semantic tier colors — used across rating pills, adv stats, confidence badges, risk tiers */
    --tier-elite: var(--green);
    --tier-high: var(--accent);
    --tier-mid: var(--yellow);
    --tier-low: var(--red);
    --purple: #a78bfa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height:100vh; }

  .header { background: linear-gradient(135deg, #131829 0%, #1a2545 100%); border-bottom: 1px solid var(--border); padding: 20px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; flex-wrap:wrap; gap:10px; }
  .header h1 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .header h1 span { color: var(--accent); }
  .header-sub { font-size:11px; color:var(--text-dim); margin-left:8px; }
  .header-right { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  .legend { display:flex; gap:14px; font-size:11px; color:var(--text-dim); }
  .legend-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:3px; vertical-align:middle; }

  .tabs { display:flex; gap:4px; padding:16px 32px 0; background: var(--bg); overflow-x:auto; }
  .tab { padding:10px 18px; border-radius:8px 8px 0 0; cursor:pointer; font-size:12px; font-weight:600; background: var(--card); color:var(--text-dim); border:1px solid var(--border); border-bottom:none; transition:all 0.2s; white-space:nowrap; }
  .tab:hover { background: var(--card-hover); color:var(--text); }
  .tab.active { background: var(--accent); color:#fff; border-color:var(--accent); }

  .main { padding:0 32px 32px; }

  .series-header { display:flex; align-items:center; justify-content:space-between; padding:24px 0 16px; flex-wrap:wrap; gap:16px; }
  .series-matchup { display:flex; align-items:center; gap:20px; }
  .team-badge { text-align:center; }
  .team-badge .seed { font-size:11px; color:var(--text-dim); margin-bottom:2px; }
  .team-badge .name { font-size:20px; font-weight:700; }
  .team-badge .record { font-size:12px; color:var(--text-dim); }
  .vs-text { font-size:14px; color:var(--text-dim); font-weight:600; }

  /* Game 1 Prediction Banner */
  .g1-banner { background: linear-gradient(135deg, #1a2545 0%, #1e1a3a 100%); border-radius:14px; padding:24px; border:1px solid var(--purple); margin-bottom:20px; position:relative; overflow:hidden; }
  .g1-banner::before { content:'GAME 1'; position:absolute; top:10px; right:16px; font-size:10px; font-weight:800; letter-spacing:2px; color:var(--purple); opacity:0.5; }
  .g1-title { font-size:16px; font-weight:700; margin-bottom:14px; color:var(--purple); }
  .g1-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:16px; }
  .g1-stat { text-align:center; }
  .g1-stat .label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
  .g1-stat .val { font-size:22px; font-weight:800; }
  .g1-stat .sub { font-size:11px; color:var(--text-dim); margin-top:2px; }
  .g1-prediction { background:rgba(167,139,250,0.1); border-radius:10px; padding:16px; margin-top:12px; }
  .g1-pick { font-size:18px; font-weight:800; margin-bottom:8px; }
  .g1-reasoning { font-size:13px; line-height:1.6; color:var(--text-dim); }
  .g1-reasoning strong { color:var(--text); }
  .g1-confidence { display:inline-block; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; margin-top:8px; }
  .g1-confidence.high { background:rgba(61,214,140,0.15); color:var(--green); }
  .g1-confidence.medium { background:rgba(255,199,58,0.15); color:var(--yellow); }
  .g1-confidence.low { background:rgba(255,79,94,0.15); color:var(--red); }
  .g1-factors { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
  .g1-factor { font-size:12px; padding:8px 12px; border-radius:8px; background:rgba(0,0,0,0.2); }
  .g1-factor .arrow { margin-right:4px; }
  .g1-factor.pro { color:var(--green); }
  .g1-factor.con { color:var(--red); }

  /* Win prob */
  .win-prob-container { background: var(--card); border-radius:12px; padding:20px; border:1px solid var(--border); margin-bottom:20px; }
  .win-prob-title { font-size:13px; font-weight:600; color:var(--text-dim); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.5px; }
  .win-prob-bar { display:flex; height:40px; border-radius:8px; overflow:hidden; }
  .win-prob-side { display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; transition:width 0.5s ease; }
  .win-prob-labels { display:flex; justify-content:space-between; margin-top:8px; font-size:13px; }

  /* Team Advanced Stats */
  .team-adv { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
  .team-adv-card { background: var(--card); border-radius:12px; padding:18px; border:1px solid var(--border); }
  .team-adv-card .team-name { font-size:14px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .team-adv-card .team-color-bar { width:4px; height:18px; border-radius:2px; }
  .adv-stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(90px,1fr)); gap:8px; }
  .adv-stat { text-align:center; padding:8px 4px; border-radius:8px; background:rgba(0,0,0,0.15); }
  .adv-stat .s-label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.3px; }
  .adv-stat .s-val { font-size:16px; font-weight:700; margin-top:2px; }
  .adv-stat .s-rank { font-size:10px; color:var(--text-dim); }
  .adv-stat.elite .s-val { color:var(--tier-elite); }
  .adv-stat.good .s-val { color:var(--tier-high); }
  .adv-stat.avg .s-val { color:var(--tier-mid); }
  .adv-stat.poor .s-val { color:var(--tier-low); }

  /* Rating cards */
  .rating-breakdown { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px; margin-bottom:20px; }
  .rating-card { background: var(--card); border-radius:10px; padding:16px; border:1px solid var(--border); }
  .rating-card .label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .rating-card .value { font-size:22px; font-weight:700; }
  .rating-card .sub { font-size:11px; color:var(--text-dim); margin-top:4px; }

  /* Player tables */
  .roster-section { margin-bottom:24px; }
  .roster-title { font-size:15px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
  .roster-title .team-color { width:4px; height:20px; border-radius:2px; }
  table { width:100%; border-collapse:collapse; background: var(--card); border-radius:10px; overflow:hidden; border:1px solid var(--border); }
  th { padding:8px 10px; text-align:left; font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.4px; background:rgba(0,0,0,0.2); font-weight:600; white-space:nowrap; }
  td { padding:8px 10px; font-size:12px; border-top:1px solid var(--border); }
  tr:hover td { background:rgba(79,140,255,0.05); }
  .player-name { font-weight:600; white-space:nowrap; }
  .pos-badge { font-size:9px; padding:2px 5px; border-radius:4px; background:rgba(79,140,255,0.15); color:var(--accent); font-weight:600; margin-left:4px; }
  .rating-pill { display:inline-block; padding:2px 8px; border-radius:10px; font-weight:700; font-size:12px; min-width:36px; text-align:center; }
  .rating-elite { background:rgba(61,214,140,0.15); color:var(--tier-elite); }
  .rating-high { background:rgba(79,140,255,0.15); color:var(--tier-high); }
  .rating-mid { background:rgba(255,199,58,0.15); color:var(--tier-mid); }
  .rating-low { background:rgba(255,79,94,0.15); color:var(--tier-low); }
  .injury-tag { font-size:9px; padding:2px 5px; border-radius:4px; background:rgba(255,79,94,0.15); color:var(--red); font-weight:600; margin-left:4px; }
  .factor-cell { max-width:180px; }
  .factor-note { font-size:11px; color:var(--text-dim); font-style:italic; }
  .adv-cell { font-size:11px; font-family:'Courier New',monospace; }

  /* Synergy */
  .synergy-section { background: var(--card); border-radius:12px; padding:18px; border:1px solid var(--border); margin-bottom:20px; }
  .synergy-title { font-size:14px; font-weight:700; margin-bottom:14px; }
  .lineup-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .lineup-row:last-child { border-bottom:none; }
  .lineup-players { display:flex; gap:4px; flex-wrap:wrap; flex:1; }
  .lineup-player-chip { font-size:10px; padding:3px 7px; border-radius:5px; background:rgba(79,140,255,0.1); color:var(--accent); font-weight:500; }
  .synergy-score { font-weight:700; font-size:14px; min-width:36px; text-align:center; }
  .synergy-note { font-size:11px; color:var(--text-dim); max-width:300px; }

  /* SPM Chemistry (Maymin et al.) */
  .spm-section { background: linear-gradient(135deg, var(--card) 0%, #1a1a2e 100%); border-radius:12px; padding:20px; border:1px solid rgba(79,140,255,0.25); margin-bottom:20px; }
  .spm-title { font-size:14px; font-weight:700; margin-bottom:4px; color:var(--accent); }
  .spm-subtitle { font-size:10px; color:var(--text-dim); margin-bottom:14px; font-style:italic; }
  .spm-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .spm-team-card { background:rgba(0,0,0,0.2); border-radius:10px; padding:14px; }
  .spm-team-name { font-size:12px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
  .spm-meter { height:8px; border-radius:4px; background:rgba(255,255,255,0.05); margin-bottom:6px; overflow:hidden; position:relative; }
  .spm-meter-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }
  .spm-skill-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .spm-skill-label { font-size:10px; color:var(--text-dim); min-width:80px; }
  .spm-skill-val { font-size:11px; font-weight:600; min-width:30px; text-align:right; }
  .spm-chem-score { text-align:center; padding:10px; margin-top:8px; border-radius:8px; background:rgba(0,0,0,0.15); }
  .spm-chem-score .label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; }
  .spm-chem-score .val { font-size:20px; font-weight:800; }
  .spm-verdict { font-size:10px; margin-top:4px; font-style:italic; }
  .spm-synergy-bar { display:flex; gap:4px; margin-top:6px; }
  .spm-synergy-chip { font-size:9px; padding:2px 6px; border-radius:4px; font-weight:600; }
  .spm-synergy-chip.positive { background:rgba(61,214,140,0.15); color:var(--green); }
  .spm-synergy-chip.negative { background:rgba(255,79,94,0.15); color:var(--red); }
  .spm-synergy-chip.neutral { background:rgba(255,199,58,0.15); color:var(--yellow); }

  /* On/Off Impact Section */
  .onoff-section { background: var(--card); border-radius:12px; padding:20px; border:1px solid var(--border); margin-bottom:20px; }
  .onoff-title { font-size:14px; font-weight:700; margin-bottom:14px; }
  .onoff-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .onoff-team { background:rgba(0,0,0,0.15); border-radius:10px; padding:14px; }
  .onoff-team-name { font-size:12px; font-weight:700; margin-bottom:10px; }
  .onoff-player { display:flex; align-items:center; justify-content:space-between; padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.03); }
  .onoff-player:last-child { border-bottom:none; }
  .onoff-name { font-size:11px; }
  .onoff-val { font-size:12px; font-weight:700; min-width:50px; text-align:right; }
  .onoff-bar { width:60px; height:6px; border-radius:3px; background:rgba(255,255,255,0.05); overflow:hidden; margin-left:8px; }
  .onoff-bar-fill { height:100%; border-radius:3px; }

  /* External factors */
  .ext-factors { background: var(--card); border-radius:12px; padding:20px; border:1px solid var(--border); margin-bottom:20px; }
  .ext-factors-title { font-size:14px; font-weight:700; margin-bottom:14px; }
  .ext-factor-item { display:flex; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); align-items:flex-start; }
  .ext-factor-item:last-child { border-bottom:none; }
  .ext-impact { font-size:11px; padding:3px 8px; border-radius:6px; font-weight:700; white-space:nowrap; }
  .ext-impact.negative { background:rgba(255,79,94,0.15); color:var(--red); }
  .ext-impact.positive { background:rgba(61,214,140,0.15); color:var(--green); }
  .ext-impact.neutral { background:rgba(255,199,58,0.15); color:var(--yellow); }
  .ext-desc { font-size:12px; line-height:1.5; }
  .ext-desc strong { color:var(--text); }
  .add-factor-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:8px; background:rgba(255,199,58,0.1); color:var(--yellow); border:1px dashed rgba(255,199,58,0.3); cursor:pointer; font-size:12px; font-weight:600; margin-top:10px; transition:all 0.2s; }
  .add-factor-btn:hover { background:rgba(255,199,58,0.2); }

  /* Game log */
  .game-log { background: var(--card); border-radius:12px; padding:20px; border:1px solid var(--border); margin-bottom:20px; }
  .game-log-title { font-size:14px; font-weight:700; margin-bottom:14px; }
  .game-entry { display:flex; align-items:center; gap:12px; padding:8px 12px; border-radius:8px; margin-bottom:4px; background:rgba(0,0,0,0.15); cursor:pointer; transition:background 0.2s; }
  .game-entry:hover { background:rgba(79,140,255,0.08); }
  .game-num { font-weight:700; color:var(--accent); min-width:55px; font-size:13px; }
  .game-result { font-weight:700; min-width:45px; font-size:13px; }
  .game-result.win { color:var(--green); }
  .game-result.loss { color:var(--red); }
  .game-result.pending { color:var(--text-dim); }
  .game-score { color:var(--text-dim); font-size:12px; }
  .series-score-display { font-size:18px; font-weight:700; margin-bottom:12px; }

  /* Methodology */
  .methodology { background: var(--card); border-radius:12px; padding:20px; border:1px solid var(--border); margin-bottom:20px; }
  .methodology summary { font-size:14px; font-weight:700; cursor:pointer; padding:4px 0; }
  .methodology .content { margin-top:14px; font-size:12px; line-height:1.7; color:var(--text-dim); }
  .methodology .content strong { color:var(--text); }
  .formula { background:rgba(0,0,0,0.3); padding:8px 12px; border-radius:8px; font-family:'Courier New',monospace; font-size:11px; margin:8px 0; color:var(--accent); overflow-x:auto; }

  /* Modal */
  .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--card); border-radius:16px; padding:24px; max-width:560px; width:90%; max-height:85vh; overflow-y:auto; border:1px solid var(--border); }
  .modal h2 { font-size:17px; margin-bottom:14px; }
  .modal label { display:block; font-size:11px; color:var(--text-dim); margin-bottom:4px; margin-top:10px; text-transform:uppercase; }
  .modal input, .modal select, .modal textarea { width:100%; padding:9px 11px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; }
  .modal textarea { min-height:50px; resize:vertical; }
  .modal-btns { display:flex; gap:10px; margin-top:16px; }
  .btn { padding:9px 18px; border-radius:8px; font-weight:600; font-size:13px; cursor:pointer; border:none; transition:all 0.2s; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#3a7aee; }
  .btn-secondary { background:var(--border); color:var(--text); }

  .data-sources { font-size:11px; color:var(--text-dim); padding:16px 0; border-top:1px solid var(--border); margin-top:16px; line-height:1.6; }
  .data-sources a { color:var(--accent); text-decoration:none; }

  /* Evidence Log */
  .evidence-section { background: var(--card); border-radius:12px; padding:20px; border:1px solid var(--border); margin-bottom:20px; }
  .evidence-title { font-size:14px; font-weight:700; margin-bottom:14px; color:var(--purple); display:flex; align-items:center; gap:8px; }
  .evidence-item { padding:12px; margin-bottom:8px; border-radius:10px; background:rgba(0,0,0,0.2); border-left:3px solid var(--purple); }
  .evidence-item .ev-claim { font-size:13px; font-weight:600; margin-bottom:6px; }
  .evidence-item .ev-proof { font-size:12px; color:var(--text-dim); line-height:1.6; }
  .evidence-item .ev-proof strong { color:var(--text); }
  .evidence-item .ev-source { font-size:10px; margin-top:6px; }
  .evidence-item .ev-source a { color:var(--accent); text-decoration:none; font-size:10px; }
  .evidence-item .ev-verdict { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; margin-top:4px; }
  .ev-verified { background:rgba(61,214,140,0.15); color:var(--green); }
  .ev-partial { background:rgba(255,199,58,0.15); color:var(--yellow); }
  .ev-uncertain { background:rgba(255,79,94,0.15); color:var(--red); }

  /* Model Lessons */
  .lessons-banner { background:linear-gradient(135deg, #1a1a2e 0%, #2d1b3d 100%); border-radius:12px; padding:18px; border:1px solid rgba(167,139,250,0.3); margin-bottom:20px; }
  .lessons-title { font-size:13px; font-weight:700; color:var(--purple); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px; }
  .lesson-item { font-size:12px; color:var(--text-dim); line-height:1.6; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
  .lesson-item:last-child { border-bottom:none; }
  .lesson-item strong { color:var(--text); }
  .lesson-label { font-size:10px; padding:2px 6px; border-radius:4px; font-weight:700; margin-right:6px; }
  .lesson-label.overweighted { background:rgba(255,79,94,0.15); color:var(--red); }
  .lesson-label.underweighted { background:rgba(255,199,58,0.15); color:var(--yellow); }
  .lesson-label.missed { background:rgba(79,140,255,0.15); color:var(--accent); }
  .lesson-label.correct { background:rgba(61,214,140,0.15); color:var(--green); }
  .lesson-label.UNDERWEIGHTED { background:rgba(255,199,58,0.15); color:var(--yellow); }
  .lesson-label.OVERWEIGHTED { background:rgba(255,79,94,0.15); color:var(--red); }
  .lesson-label.MISSED { background:rgba(79,140,255,0.15); color:var(--accent); }
  .lesson-label.CORRECT { background:rgba(61,214,140,0.15); color:var(--green); }

  /* Game 2 Prediction Banner */
  .g2-banner { background: linear-gradient(135deg, #1a3525 0%, #1a2e3a 100%); border-radius:14px; padding:24px; border:1px solid var(--green); margin-bottom:20px; position:relative; overflow:hidden; }
  .g2-banner::before { content:'GAME 2'; position:absolute; top:10px; right:16px; font-size:10px; font-weight:800; letter-spacing:2px; color:var(--green); opacity:0.5; }
  .g2-title { font-size:16px; font-weight:700; margin-bottom:14px; color:var(--green); }
  .g2-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:16px; }
  .g2-stat { text-align:center; }
  .g2-stat .label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
  .g2-stat .val { font-size:22px; font-weight:800; }
  .g2-prediction { background:rgba(61,214,140,0.08); border-radius:10px; padding:16px; margin-top:12px; }
  .g2-pick { font-size:18px; font-weight:800; margin-bottom:8px; }
  .g2-reasoning { font-size:13px; line-height:1.6; color:var(--text-dim); }
  .g2-reasoning strong { color:var(--text); }
  .g2-confidence { display:inline-block; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; margin-top:8px; }
  .g2-confidence.high { background:rgba(61,214,140,0.15); color:var(--green); }
  .g2-confidence.medium { background:rgba(255,199,58,0.15); color:var(--yellow); }
  .g2-confidence.low { background:rgba(255,79,94,0.15); color:var(--red); }

// SCENARIO BUILDER STATE
// ============================================================
const scenarioState = {};
function initScenarioState() {
  SERIES_DATA.forEach(s => {
    scenarioState[s.id] = {};
    [...s.homeTeam.players, ...s.awayTeam.players].forEach(p => {
      scenarioState[s.id][p.name] = (p.injury && p.injury.includes('OUT')) ? 'out' : 'in';
    });
  });
}

function togglePlayer(seriesId, playerName) {
  const current = scenarioState[seriesId][playerName];
  scenarioState[seriesId][playerName] = current === 'out' ? 'in' : 'out';
  clearSPMCache(); // Clear cached chemistry when roster changes
  renderSeries();
}

function getEffectiveRating(player, seriesId) {
  if (scenarioState[seriesId] && scenarioState[seriesId][player.name] === 'out') return 0;
  return player.rating;
}

// ============================================================
// SPM CHEMISTRY ENGINE (Maymin, Maymin & Shen, IJCSS 2013)
// ============================================================
// Skills Plus Minus framework: 6 skill dimensions per player
// Synergy = Team performance - Sum of individual parts
// Key insight: complementary skills > redundant offensive skills
//
// Synergy coefficients (same skill with itself):
//   Offensive Scoring  × itself = -0.826 (share one ball)
//   Offensive BallHndl × itself = -0.825 (one handler enough)
//   Offensive Rebound  × itself = +0.168 (crash boards together)
//   Defensive Scoring  × itself = -0.284 (most stops end a stop)
//   Defensive BallHndl × itself = +0.307 (turnover creators feed off each other)
//   Defensive Rebound  × itself = +0.205 (boxing out helps each other)
//
// Cross-skill synergies (approximated from paper):
//   Off Scoring × Off BallHndl = +0.412 (PnR, drive-and-kick)
//   Off Scoring × Off Rebound  = +0.185 (putbacks, second chances)
//   Off BallHndl × Off Rebound = +0.092 (transition off boards)
//   Def Scoring × Def BallHndl = +0.348 (steals → fastbreaks)
//   Def Scoring × Def Rebound  = +0.221 (stops + secure possession)
//   Def BallHndl × Def Rebound = +0.156 (active hands + boards)
// ============================================================

// SPM Synergy coefficient matrix (6x6)
const SPM_COEFF = {
  oScr_oScr: -0.826, oScr_oBH: 0.412, oScr_oReb: 0.185,
  oBH_oBH: -0.825,   oBH_oReb: 0.092,
  oReb_oReb: 0.168,
  dScr_dScr: -0.284, dScr_dBH: 0.348, dScr_dReb: 0.221,
  dBH_dBH: 0.307,    dBH_dReb: 0.156,
  dReb_dReb: 0.205
};

// Infer SPM skill profile from player stats (0-10 scale)
function inferSPMSkills(p) {
  if (p.rating <= 0) return { oScr:0, oBH:0, oReb:0, dScr:0, dBH:0, dReb:0 };
  // Offensive Scoring: PPG-driven, TS% adjusted
  const oScr = Math.min(10, (p.ppg / 3.2) * (p.ts / 57));
  // Offensive Ball-Handling: APG-driven, turnover awareness
  const oBH = Math.min(10, (p.apg / 1.2) + (p.epm > 3 ? 1.5 : 0));
  // Offensive Rebounding: RPG for non-guards, position-adjusted
  const isGuard = p.pos === 'PG' || p.pos === 'SG';
  const oReb = Math.min(10, isGuard ? p.rpg * 0.6 : p.rpg * 0.8);
  // Defensive Scoring: BPM + on/off driven (ability to get stops)
  const dScr = Math.min(10, 3 + p.bpm * 0.6 + (p.onOff > 5 ? 1.5 : p.onOff > 2 ? 0.8 : 0));
  // Defensive Ball-Handling: steals proxy from clutch + defensive reputation
  const dBH = Math.min(10, 2 + p.clutch * 0.35 + (p.bpm > 3 ? 1.5 : p.bpm > 1 ? 0.8 : 0));
  // Defensive Rebounding: RPG for bigs, reduced for guards
  const dReb = Math.min(10, isGuard ? p.rpg * 0.5 : p.rpg * 0.7);
  return { oScr: +oScr.toFixed(1), oBH: +oBH.toFixed(1), oReb: +oReb.toFixed(1),
           dScr: +dScr.toFixed(1), dBH: +dBH.toFixed(1), dReb: +dReb.toFixed(1) };
}

// SPM Chemistry cache — avoids recalculating identical lineups
const _spmCache = new Map();
function getCachedSPM(team, seriesId) {
  const key = seriesId + '_' + team.abbr;
  if (_spmCache.has(key)) return _spmCache.get(key);
  const result = calcSPMChemistry(team.players.filter(p => p.rating > 0).slice(0, 8));
  _spmCache.set(key, result);
  return result;
}
function clearSPMCache() { _spmCache.clear(); }

// Calculate SPM chemistry score for a lineup (array of player objects)
function calcSPMChemistry(players) {
  const active = players.filter(p => p.rating > 0);
  if (active.length < 3) return { score: 50, synergies: [], verdict: "Insufficient data" };

  const skills = active.map(p => inferSPMSkills(p));
  let totalSynergy = 0;
  const synergies = [];

  // For each pair of players, calculate pairwise synergies
  for (let i = 0; i < skills.length; i++) {
    for (let j = i + 1; j < skills.length; j++) {
      const a = skills[i], b = skills[j];
      let pairSyn = 0;

      // Same-skill overlaps (redundancy penalties / complementarity bonuses)
      pairSyn += a.oScr * b.oScr * SPM_COEFF.oScr_oScr / 25; // normalized by max product
      pairSyn += a.oBH * b.oBH * SPM_COEFF.oBH_oBH / 25;
      pairSyn += a.oReb * b.oReb * SPM_COEFF.oReb_oReb / 25;
      pairSyn += a.dScr * b.dScr * SPM_COEFF.dScr_dScr / 25;
      pairSyn += a.dBH * b.dBH * SPM_COEFF.dBH_dBH / 25;
      pairSyn += a.dReb * b.dReb * SPM_COEFF.dReb_dReb / 25;

      // Cross-skill synergies (complementary boosts)
      pairSyn += (a.oScr * b.oBH + a.oBH * b.oScr) * SPM_COEFF.oScr_oBH / 50;
      pairSyn += (a.oScr * b.oReb + a.oReb * b.oScr) * SPM_COEFF.oScr_oReb / 50;
      pairSyn += (a.oBH * b.oReb + a.oReb * b.oBH) * SPM_COEFF.oBH_oReb / 50;
      pairSyn += (a.dScr * b.dBH + a.dBH * b.dScr) * SPM_COEFF.dScr_dBH / 50;
      pairSyn += (a.dScr * b.dReb + a.dReb * b.dScr) * SPM_COEFF.dScr_dReb / 50;
      pairSyn += (a.dBH * b.dReb + a.dReb * b.dBH) * SPM_COEFF.dBH_dReb / 50;

      totalSynergy += pairSyn;
      if (Math.abs(pairSyn) > 0.15) {
        synergies.push({
          pair: `${active[i].name.split(' ').pop()}-${active[j].name.split(' ').pop()}`,
          value: +pairSyn.toFixed(2),
          type: pairSyn > 0.1 ? 'positive' : pairSyn < -0.1 ? 'negative' : 'neutral'
        });
      }
    }
  }

  // Normalize to 0-100 scale (centered at 50)
  const rawScore = 50 + totalSynergy * 8;
  const score = Math.min(95, Math.max(15, Math.round(rawScore)));

  // Sort synergies by absolute value
  synergies.sort((a, b) => Math.abs(b.value) - Math.abs(a.value));

  let verdict;
  if (score >= 75) verdict = "Elite chemistry — complementary skills amplify each other";
  else if (score >= 65) verdict = "Strong chemistry — diverse skill profiles with minor overlaps";
  else if (score >= 50) verdict = "Adequate chemistry — some redundancy but functional fit";
  else if (score >= 40) verdict = "Concerning chemistry — significant skill redundancy on offense";
  else verdict = "Poor chemistry — too many overlapping roles create diminishing returns";

  return { score, synergies: synergies.slice(0, 5), verdict, rawSynergy: +totalSynergy.toFixed(2) };
}

// Calculate team-level on/off impact summary
function calcOnOffSummary(team) {
  const active = team.players.filter(p => p.rating > 0);
  const sorted = [...active].sort((a, b) => b.onOff - a.onOff);
  const avgOnOff = active.reduce((s, p) => s + p.onOff, 0) / active.length;
  const topOnOff = sorted[0];
  const worstOnOff = sorted[sorted.length - 1];
  const swing = topOnOff.onOff - worstOnOff.onOff;
  return { avg: +avgOnOff.toFixed(1), top: topOnOff, worst: worstOnOff, swing: +swing.toFixed(1), players: sorted };
}

// ============================================================
// BACKTEST-CALIBRATED MODEL CONSTANTS (2025 Playoff Backtest: 73.5% accuracy → targeting 80%+)
// ============================================================
// Lesson 1: HCA decays in later rounds. Road teams won G1 in ~75% of later-round series.
const HCA_BY_ROUND = { 'R1': 3.0, 'R2': 2.0, 'CF': 1.5, 'Finals': 1.0 };
const HCA_GAME7_OVERRIDE = 5.0; // Game 7 home team wins ~78% historically

// Lesson 3: System coherence — teams with elite systems outperform individual talent ratings
// Applied per-team as systemBonus in SERIES_DATA (range: -2 to +3)

// Lesson 4: Championship DNA — recent playoff/championship experience in elimination games
// playoffPedigree per team (0 = no recent playoff success, 1 = deep run, 2 = recent champion)

// Lesson 5: Health degradation — players with injury risk degrade over long series
// injuryRisk per player (0 = healthy, 0.5 = minor concern, 1.0 = significant risk)

// Lesson 7: Star ceiling variance — elite stars produce games far above baseline ~1x per series
// starCeiling per player (0 = normal, 1 = occasional explosion, 2 = historic ceiling games)

// Lesson 2 & 5 (combined): Bounce-back qualifier
// Bounce-backs work for dominant favorites in R1 but fail in later rounds vs system teams
function calcBounceBackProb(series) {
  const round = series.round || 'R1';
  const roundMod = { 'R1': 1.0, 'R2': 0.7, 'CF': 0.5, 'Finals': 0.4 };
  const base = 0.77; // 77% baseline from 2021-22 data
  let prob = base * (roundMod[round] || 1.0);
  const awaySystem = series.awayTeam.systemBonus || 0;
  const homeSystem = series.homeTeam.systemBonus || 0;
  prob -= Math.max(0, awaySystem - homeSystem) * 0.05;
  return Math.min(0.85, Math.max(0.35, prob));
}

// Underdog explosion game estimate (how many games the underdog "gets" in a series)
function estimateUnderdogGames(series) {
  const prob = calcWinProbRaw(series);
  const favPct = Math.max(prob.home, prob.away);
  if (favPct >= 75) return 1; // Heavy favorite — underdog gets ~1 explosion game
  if (favPct >= 60) return 2; // Clear favorite — underdog gets ~2
  return 3; // Toss-up — could go either way
}

// Raw win prob without series score context (for planning purposes)
function calcWinProbRaw(series) {
  const hr = calcTeamRating(series.homeTeam, series);
  const ar = calcTeamRating(series.awayTeam, series);
  const round = series.round || 'R1';
  const baseHCA = HCA_BY_ROUND[round] || 3.0;
  const hca = series.homeCourtOverride === 'away' ? -baseHCA : baseHCA;
  const diff = (hr + hca) - ar;
  const prob = 1 / (1 + Math.pow(10, -diff / 15));
  return { home: Math.round(prob * 100), away: Math.round((1 - prob) * 100) };
}

// ============================================================
// ENGINE
// ============================================================

function getRatingClass(r) {
  if (r >= 85) return 'rating-elite';
  if (r >= 70) return 'rating-high';
  if (r >= 55) return 'rating-mid';
  return 'rating-low';
}

function calcTeamRating(team, series, seriesId) {
  // REPLACEMENT-LEVEL SLOT SYSTEM
  // Instead of filtering out inactive players and re-averaging (which self-heals),
  // we keep every roster slot fixed and substitute replacement-level (42) for missing players.
  // This means losing a star (87 rating) costs ~45 weighted points in their slot,
  // rather than just promoting bench players to higher weights.
  const REPLACEMENT_LEVEL = 42;

  // Sort ALL players by baseRating to establish fixed role hierarchy
  const sorted = [...team.players].sort((a, b) => {
    const ra = a.baseRating || a.rating || 0;
    const rb = b.baseRating || b.rating || 0;
    return rb - ra;
  });

  let totalWeight = 0, weightedSum = 0;
  sorted.forEach((p, i) => {
    // Determine if this player is active (not injured AND not toggled out)
    const effectiveR = seriesId ? getEffectiveRating(p, seriesId) : p.rating;
    const isActive = effectiveR > 0;
    // Use their actual rating if active, replacement-level if not
    const r = isActive ? (p.baseRating || p.rating) : REPLACEMENT_LEVEL;
    const w = Math.max(1, 5 - i);
    weightedSum += r * w;
    totalWeight += w;
  });

  if (!totalWeight) return 20;
  let base = weightedSum / totalWeight;

  // SYNERGY: only count lineups where ALL players are currently active
  const activeNames = new Set(
    team.players.filter(p => {
      const r = seriesId ? getEffectiveRating(p, seriesId) : p.rating;
      return r > 0;
    }).map(p => p.name)
  );
  const validSynergies = team.synergy.filter(s => s.players.every(name => activeNames.has(name)));
  const bestSynergy = validSynergies.length > 0 ? Math.max(...validSynergies.map(s => s.score)) : 50;
  base += (bestSynergy - 70) / 5;

  // External factors
  const teamFactors = series.externalFactors.filter(f => f.team === team.abbr);
  base += teamFactors.reduce((s, f) => s + f.impact, 0) / 3;

  // SPM Chemistry bonus (Maymin et al.) — only active players
  const activePlayers = team.players.filter(p => {
    const r = seriesId ? getEffectiveRating(p, seriesId) : p.rating;
    return r > 0;
  });
  const spmChem = calcSPMChemistry(activePlayers.slice(0, 8));
  base += (spmChem.score - 50) / 10;

  // On/Off aggregate bonus — only active players
  const avgOnOff = activePlayers.length > 0
    ? activePlayers.reduce((s, p) => s + p.onOff, 0) / activePlayers.length
    : 0;
  base += avgOnOff / 4;

  // Helper: is a player BASELINE injured (already OUT before any user toggles)?
  // vs SCENARIO-TOGGLED (user clicked them out via scenario builder)
  // Baseline injured = rating === 0 AND has an injury containing 'OUT'
  // Scenario-toggled = rating > 0 (or baseRating > 0 with no baseline injury) AND user set to 'out'
  const isBaselineInjured = (p) => p.rating === 0 && p.injury && p.injury.includes('OUT');
  const isScenarioToggled = (p) => {
    if (isBaselineInjured(p)) return false; // already injured at baseline — not a scenario toggle
    return seriesId && scenarioState[seriesId] && scenarioState[seriesId][p.name] === 'out';
  };

  // Advanced stats bonus — scale down only for SCENARIO-TOGGLED players (not baseline injuries)
  // Baseline injuries are already reflected in the team's regular season advStats
  const scenarioOutCount = team.players.filter(p => {
    const br = p.baseRating || 0;
    return isScenarioToggled(p) && br >= 65; // significant rotation player toggled out by user
  }).length;
  const advScale = Math.max(0.3, 1 - scenarioOutCount * 0.15);
  base += ((team.advStats.netRtg - 3) / 3) * advScale;
  base += ((team.advStats.clutchNetRtg - 3) / 4) * advScale;

  // Compounding penalty for multiple SCENARIO-TOGGLED star absences
  // Only counts stars the USER removed — not already-injured players
  const scenarioOutStars = team.players.filter(p => {
    const br = p.baseRating || 0;
    return isScenarioToggled(p) && br >= 75;
  });
  if (scenarioOutStars.length >= 2) {
    base -= scenarioOutStars.length * 2.5;
  }

  // HISTORICAL CALIBRATION (2025-26 regular season without-star data)
  // ONLY for scenario-toggled players — not baseline injuries (already baked in)
  const histTeamData = HISTORICAL_WITHOUT[team.abbr];
  if (seriesId && histTeamData) {
    team.players.forEach(p => {
      if (isScenarioToggled(p) && histTeamData[p.name]) {
        const h = histTeamData[p.name];
        base += h.netRtgSwing / 4;
      }
    });
  }

  // BACKTEST LESSON 3: System Coherence Bonus
  // Teams with elite offensive/defensive systems outperform individual ratings
  if (team.systemBonus != null) {
    base += team.systemBonus;
  }

  // BACKTEST LESSON 4: Championship DNA / Playoff Pedigree
  // Teams with recent deep runs perform ~3-5% above baseline in high-leverage moments
  if (team.playoffPedigree != null && team.playoffPedigree > 0) {
    base += team.playoffPedigree * 0.8; // 0.8 per pedigree point (max ~1.6)
  }

  // BACKTEST LESSON 5: Health Degradation Curve
  // Players with injuryRisk > 0 get progressively reduced ratings in later rounds
  const round = series.round || 'R1';
  const roundDepth = { 'R1': 0, 'R2': 1, 'CF': 2, 'Finals': 3 };
  const depth = roundDepth[round] || 0;
  if (depth > 0) {
    team.players.forEach(p => {
      if (p.injuryRisk && p.injuryRisk > 0 && p.rating > 0) {
        // Reduce effective contribution by injuryRisk * depth * 0.4
        // This is a team-level penalty (star playing hurt drags team down)
        base -= p.injuryRisk * depth * 0.4;
      }
    });
  }

  return Math.min(99, Math.max(20, Math.round(base)));
}

function calcWinProb(series, seriesId) {
  const hr = calcTeamRating(series.homeTeam, series, seriesId);
  const ar = calcTeamRating(series.awayTeam, series, seriesId);

  // BACKTEST LESSON 1: Round-adjusted HCA (replaces flat +3)
  // R1=3.0, R2=2.0, CF=1.5, Finals=1.0 — road teams steal more games in later rounds
  const round = series.round || 'R1';
  let baseHCA = HCA_BY_ROUND[round] || 3.0;

  // BACKTEST LESSON 6: Game 7 override — home teams win ~78% of Game 7s
  // Check if we're in a potential Game 7 scenario (series tied 3-3)
  const score = getSeriesScore(series);
  if (score.home === 3 && score.away === 3) {
    baseHCA = HCA_GAME7_OVERRIDE;
  }

  // homeCourtOverride: 'away' means the away team in data structure actually has home court
  const hca = series.homeCourtOverride === 'away' ? -baseHCA : baseHCA;

  // BACKTEST LESSON 7: Star ceiling variance factor
  // Elite stars add a small "upside variance" that slightly favors the team with higher-ceiling stars
  let homeCeiling = 0, awayCeiling = 0;
  series.homeTeam.players.forEach(p => { if (p.starCeiling && p.rating > 0) homeCeiling += p.starCeiling * 0.3; });
  series.awayTeam.players.forEach(p => { if (p.starCeiling && p.rating > 0) awayCeiling += p.starCeiling * 0.3; });
  const ceilingDiff = homeCeiling - awayCeiling;

  const diff = (hr + hca + ceilingDiff) - ar;
  const prob = 1 / (1 + Math.pow(10, -diff / 15));
  return {
    home: Math.round(prob * 100), away: Math.round((1 - prob) * 100),
    homeRating: hr, awayRating: ar,
    hcaUsed: +hca.toFixed(1), round: round
  };
}

function getSeriesScore(series) {
  let home = 0, away = 0;
  series.games.forEach(g => { if (g.winner === series.homeTeam.abbr) home++; else if (g.winner === series.awayTeam.abbr) away++; });
  return { home, away };
}

// Derive display string from games array (replaces duplicated actualResult strings)
function getGameResultDisplay(series, gameNum) {
  const g = series.games[gameNum - 1];
  if (!g || !g.winner) return null;
  const winnerIsHome = g.winner === series.homeTeam.abbr;
  const wScore = winnerIsHome ? g.homeScore : g.awayScore;
  const lScore = winnerIsHome ? g.awayScore : g.homeScore;
  const loser = winnerIsHome ? series.awayTeam.abbr : series.homeTeam.abbr;
  return `${g.winner} ${wScore} — ${loser} ${lScore}${g.notes ? '. ' + g.notes.split('.')[0] : ''}`;
}

function loadState() {
  try {
    const saved = localStorage.getItem('nba2026playoffV2');
    if (saved) {
      const parsed = JSON.parse(saved);
      parsed.forEach((sv, i) => {
        if (SERIES_DATA[i]) {
          SERIES_DATA[i].games = sv.games || SERIES_DATA[i].games;
          if (sv.externalFactors) SERIES_DATA[i].externalFactors = sv.externalFactors;
          if (sv.playerRatings) {
            Object.entries(sv.playerRatings).forEach(([tk, ratings]) => {
              const team = SERIES_DATA[i][tk];
              if (team) Object.entries(ratings).forEach(([pn, pr]) => { const p = team.players.find(x => x.name === pn); if (p) p.rating = pr; });
            });
          }
        }
      });
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('nba2026playoffV2', JSON.stringify(SERIES_DATA.map(s => ({
      games: s.games, externalFactors: s.externalFactors,
      playerRatings: { homeTeam: Object.fromEntries(s.homeTeam.players.map(p=>[p.name,p.rating])), awayTeam: Object.fromEntries(s.awayTeam.players.map(p=>[p.name,p.rating])) }

  } catch(e) {}
}

function advStatClass(val, goodThresh, greatThresh, invert) {
  if (invert) { if (val <= greatThresh) return 'elite'; if (val <= goodThresh) return 'good'; if (val <= goodThresh+3) return 'avg'; return 'poor'; }
  if (val >= greatThresh) return 'elite'; if (val >= goodThresh) return 'good'; if (val >= goodThresh-3) return 'avg'; return 'poor';
}

function renderScenarioBuilder(s) {
  // Baseline: use the default ratings (injury OUT players have rating=0 already)
  const baseProb = calcWinProb(s);
  // Scenario: use toggle state
  const scenProb = calcWinProb(s, s.id);
  const homeBasePct = baseProb.home;
  const awayBasePct = baseProb.away;
  const homeScenPct = scenProb.home;
  const awayScenPct = scenProb.away;
  const homeDelta = homeScenPct - homeBasePct;
  const awayDelta = awayScenPct - awayBasePct;

  // Collect toggled-out players that differ from baseline
  const chips = [];
  const allPlayers = [...s.homeTeam.players, ...s.awayTeam.players];
  allPlayers.forEach(p => {
    const state = scenarioState[s.id][p.name];
    const isBaselineOut = (p.injury && p.injury.includes('OUT'));
    const teamAbbr = s.homeTeam.players.includes(p) ? s.homeTeam.abbr : s.awayTeam.abbr;
    if (state === 'out' && !isBaselineOut) {
      chips.push({ name: p.name, team: teamAbbr, type: 'out', label: 'Toggled OUT' });
    } else if (state === 'in' && isBaselineOut) {
      chips.push({ name: p.name, team: teamAbbr, type: 'in', label: 'Toggled IN' });
    } else if (state === 'out' && isBaselineOut) {
      // baseline out, still out - no chip needed
    } else if (p.injury && p.injury.includes('GTD')) {
      chips.push({ name: p.name, team: teamAbbr, type: 'gtd', label: 'GTD' });
    }
  });

  const homeColor = s.homeTeam.color;
  const awayColor = s.awayTeam.color;
  const deltaColor = homeDelta > 0 ? 'var(--green)' : homeDelta < 0 ? 'var(--red)' : 'var(--text-dim)';
  const deltaSign = homeDelta > 0 ? '+' : '';

  return `<div class="scenario-builder">
    <div class="scenario-title">Scenario Builder</div>
    <div class="scenario-subtitle">Toggle players IN/OUT in the roster tables below to see how win probabilities change in real-time</div>
    <div class="scenario-comparison">
      <div class="scenario-col">
        <div class="team-name" style="color:${s.homeTeam.color2}">${s.homeTeam.name}</div>
        <div class="label">Win Probability</div>
        <div class="prob" style="color:${homeScenPct>=50?'var(--green)':'var(--red)'}">${homeScenPct}%</div>
        <div class="spread">Rating: ${scenProb.homeRating}</div>
        ${homeDelta !== 0 ? `<div class="spread" style="color:${homeDelta>0?'var(--green)':'var(--red)'}">( ${homeDelta>0?'+':''}${homeDelta}% from baseline )</div>` : '<div class="spread" style="color:var(--text-dim)">( baseline )</div>'}
      </div>
      <div class="scenario-vs">VS</div>
      <div class="scenario-col">
        <div class="team-name" style="color:${s.awayTeam.color2}">${s.awayTeam.name}</div>
        <div class="label">Win Probability</div>
        <div class="prob" style="color:${awayScenPct>=50?'var(--green)':'var(--red)'}">${awayScenPct}%</div>
        <div class="spread">Rating: ${scenProb.awayRating}</div>
        ${awayDelta !== 0 ? `<div class="spread" style="color:${awayDelta>0?'var(--green)':'var(--red)'}">( ${awayDelta>0?'+':''}${awayDelta}% from baseline )</div>` : '<div class="spread" style="color:var(--text-dim)">( baseline )</div>'}
      </div>
    </div>
    ${chips.length ? `<div class="scenario-delta">
      <div class="delta-label">Player Status Changes</div>
      <div class="delta-items">
        ${chips.map(c => `<span class="delta-chip ${c.type}">${c.team} ${c.name} — ${c.label}</span>`).join('')}
      </div>
    </div>` : ''}
  </div>`;
}

            <div class="adv-stat ${advStatClass(t.advStats.netRtg,3,6,false)}"><div class="s-label">Net</div><div class="s-val">${t.advStats.netRtg>0?'+':''}${t.advStats.netRtg}</div></div>
            <div class="adv-stat ${advStatClass(t.advStats.ts,57,59,false)}"><div class="s-label">TS%</div><div class="s-val">${t.advStats.ts}</div></div>

            <div class="adv-stat"><div class="s-label">Pace</div><div class="s-val">${t.advStats.pace}</div></div>
            <div class="adv-stat ${advStatClass(t.advStats.tov,13,12,true)}"><div class="s-label">TOV%</div><div class="s-val">${t.advStats.tov}</div></div>
            <div class="adv-stat"><div class="s-label">Last 10</div><div class="s-val" style="font-size:13px">${t.advStats.last10}</div></div>

      `).join('')}

    <!-- RATING CARDS -->
    <div class="rating-breakdown">
      <div class="rating-card"><div class="label">Best Player Edge</div><div class="value">${getBestPlayerEdge(s)}</div><div class="sub">${getBestPlayerNote(s)}</div></div>
      <div class="rating-card"><div class="label">EPM Edge</div><div class="value">${getEPMEdge(s)}</div><div class="sub">${getEPMNote(s)}</div></div>
      <div class="rating-card"><div class="label">Synergy Edge</div><div class="value">${getSynergyEdge(s)}</div><div class="sub">${getSynergyNote(s)}</div></div>
      <div class="rating-card"><div class="label">Clutch Edge</div><div class="value">${getClutchEdge(s)}</div><div class="sub">${getClutchNote(s)}</div></div>
      <div class="rating-card"><div class="label">SPM Chemistry</div><div class="value">${getSPMEdge(s)}</div><div class="sub">${getSPMNote(s)}</div></div>
      <div class="rating-card"><div class="label">On/Off Impact</div><div class="value">${getOnOffEdge(s)}</div><div class="sub">${getOnOffNote(s)}</div></div>
      <div class="rating-card"><div class="label">External Impact</div><div class="value">${getExternalEdge(s)}</div><div class="sub">${getExternalNote(s)}</div></div>
      <div class="rating-card"><div class="label">Series Score</div><div class="value">${score.home} — ${score.away}</div><div class="sub">${s.homeTeam.abbr} — ${s.awayTeam.abbr}</div></div>
    </div>

    <!-- EXTERNAL FACTORS -->
    <div class="ext-factors">
      <div class="ext-factors-title">External & Off-Court Factors</div>
      ${s.externalFactors.map(f => `<div class="ext-factor-item"><div class="ext-impact ${f.impact>0?'positive':f.impact<0?'negative':'neutral'}">${f.impact>0?'+':''}${f.impact} ${f.team}</div><div class="ext-desc"><strong>${f.player||f.team+' Team'}:</strong> ${f.desc}${f.evidence?`<details style="margin-top:6px"><summary style="font-size:11px;color:var(--purple);cursor:pointer;font-weight:600">View Evidence</summary><div style="margin-top:6px;padding:8px;background:rgba(0,0,0,0.2);border-radius:6px;font-size:11px;line-height:1.6;color:var(--text-dim)">${f.evidence}${f.verdict?` <span class="ev-verdict ${f.verdict==='verified'?'ev-verified':f.verdict==='partial'?'ev-partial':'ev-uncertain'}">${f.verdict.toUpperCase()}</span>`:''}</div></details>`:''}</div></div>`).join('')}
      <div class="add-factor-btn" onclick="openFactorModal()">+ Add External Factor</div>
    </div>

    ${renderRosterTable(s.awayTeam, s)}

    <!-- SYNERGY -->
    ${renderSynergy(s.homeTeam)}
    ${renderSynergy(s.awayTeam)}

    ${renderSPMChemistry(s)}

    ${s.coaching ? renderCoaching(s) : ''}

    <div class="game-log">
      <div class="game-log-title">Game-by-Game Results — Click to update</div>
      <div class="series-score-display">${s.homeTeam.abbr} ${score.home} — ${score.away} ${s.awayTeam.abbr}</div>
      ${s.games.map((g,gi) => { const isHome = gi<2||gi===4||gi===6; return `<div class="game-entry" onclick="openGameModal(${gi})"><div class="game-num">Game ${g.num}</div><div style="font-size:11px;color:var(--text-dim);min-width:30px">@ ${isHome?s.homeTeam.abbr:s.awayTeam.abbr}</div>${g.winner?`<div class="game-result ${g.winner===s.homeTeam.abbr?'win':'loss'}">${g.winner}</div><div class="game-score">${g.homeScore} — ${g.awayScore}</div><div style="flex:1;font-size:11px;color:var(--text-dim)">${g.notes||''}</div>`:`<div class="game-result pending">TBD</div>`}</div>`}).join('')}
    </div>

    <!-- METHODOLOGY -->
    <details class="methodology">
      <summary>Advanced Rating Methodology</summary>
      <div class="content">
        <strong>Player Composite Rating (0-100):</strong> Multi-metric blend sourced from Basketball Reference, NBA.com, and DunksAndThrees EPM.
        <div class="formula">Rating = PER_norm(15%) + TS_norm(12%) + EPM(18%) + BPM(15%) + WS/48(12%) + On/Off(10%) + Usage_ctx(8%) + Clutch(10%)</div>
        <strong>Key Advanced Metrics:</strong>
        <strong>PER</strong> — Player Efficiency Rating (league avg 15.0). <strong>TS%</strong> — True Shooting % (accounts for 2PT, 3PT, FT). <strong>EPM</strong> — Estimated Plus-Minus (best single impact metric, RMSE 2.48). <strong>BPM</strong> — Box Plus-Minus (pts/100 above average). <strong>WS/48</strong> — Win Shares per 48 min. <strong>On/Off</strong> — Team NetRtg swing with player on vs off court. <strong>Clutch</strong> — Performance in last 5 min, score within 5 pts.
        <div class="formula">Team Rating = Weighted Player Avg + Synergy Bonus + ExtFactors/3 + (NetRtg-3)/3 + (ClutchNet-3)/4</div>
        <strong>SPM Chemistry Model (Maymin, Maymin & Shen, IJCSS 2013):</strong> The Skills Plus Minus framework decomposes each player into 6 skill dimensions — Offensive Scoring, Offensive Ball-Handling, Offensive Rebounding, Defensive Scoring, Defensive Ball-Handling, Defensive Rebounding. Skill profiles are inferred from box-score stats. For each pair of players, synergies are calculated using the paper's coefficient matrix.
        <div class="formula">Synergy(A,B) = Σ (SkillA_i × SkillB_j × Coeff_ij) for all skill pairs i,j</div>
        <strong>Key Synergy Coefficients:</strong> Off. Scoring × itself = <span style="color:var(--red)">-0.826</span> (sharing one ball). Off. Ball-Handling × itself = <span style="color:var(--red)">-0.825</span> (one handler is enough). Def. Ball-Handling × itself = <span style="color:var(--green)">+0.307</span> (turnover creators amplify). Off. Scoring × Off. Ball-Handling = <span style="color:var(--green)">+0.412</span> (PnR/drive-and-kick). Insight: <em>complementary</em> skills create positive synergy, <em>redundant</em> offensive skills create negative synergy.
        <div class="formula">Team Rating += (SPM_Chemistry - 50) / 10</div>
        <strong>On/Off Court Impact:</strong> Net Rating differential when player is on vs. off court. Sourced from Basketball-Reference on/off splits and FantasyLabs. Integrated into team rating as: <code>base += avg(team_onOff) / 4</code>. High on/off players (>+5.0) are franchise-altering; negative on/off players are liabilities when on court.
        <div class="formula">Team Rating += avg(OnOff) / 4</div>
        <strong>Coaching Intelligence Model:</strong> Each series includes coaching tendencies, best 5-man lineup data (net rating, ORtg, DRtg, minutes), and playoff role change predictions. Coaching data is sourced from ESPN, CBS Sports, SI, Yahoo Sports, and team-specific beat reporters. Rotation plans, key adjustments, and role shifts are predicted based on each coach's historical playoff tendencies, regular season rotation patterns, and matchup-specific requirements. Lineup data uses NBA.com's lineup tracking tools filtered for 5-man combinations with significant minutes.
        <strong>Game 1 Model:</strong> Team rating differential + home court (+3.5 for G1) + momentum (last 10) + injury impact + clutch rating differential + playoff experience modifier. SPM Chemistry and On/Off aggregates now feed into the team rating that drives predictions.
        <div class="formula">P(home) = 1 / (1 + 10^(-(homeRating + 3.5 - awayRating) / 15))</div>
        <strong>Data Sources:</strong> Basketball-Reference.com (PER, BPM, WS/48, On/Off), NBA.com (ORtg, DRtg, clutch splits), DunksAndThrees.com (EPM), <a href="https://philipmaymin.com/papers/Maymin%20Maymin%20and%20Shen%20-%20NBA%20Chemistry%20-%20IJCSS.pdf">Maymin et al. NBA Chemistry (IJCSS 2013)</a>, <a href="https://www.fantasylabs.com/nba/on-off/">FantasyLabs On/Off</a>, various sportsbooks.
      </div>
    </details>

    <div class="data-sources">
      <strong>Sources:</strong>
      <a href="https://www.basketball-reference.com/leagues/NBA_2026_advanced.html">Basketball-Reference Advanced Stats</a> |
      <a href="https://dunksandthrees.com/epm">DunksAndThrees EPM</a> |
      <a href="https://www.nba.com/stats/teams/advanced">NBA.com Team Advanced</a> |
      <a href="https://www.nba.com/stats/teams/clutch-advanced">NBA.com Clutch Stats</a> |
      <a href="https://www.fantasylabs.com/nba/on-off/">FantasyLabs On/Off</a> |
      <a href="https://philipmaymin.com/papers/Maymin%20Maymin%20and%20Shen%20-%20NBA%20Chemistry%20-%20IJCSS.pdf">Maymin et al. NBA Chemistry (IJCSS 2013)</a>
    </div>
  `;
}

function renderRosterTable(team, series) {
  const sid = series.id;
  return `<div class="roster-section"><div class="roster-title"><span class="team-color" style="background:${team.color}"></span>${team.city} ${team.name} — Player Ratings (Advanced) <span style="font-size:10px;color:var(--text-dim);font-weight:400;margin-left:8px">Click toggles to build scenarios</span></div>
  <div style="overflow-x:auto"><table><tr><th></th><th>Player</th><th>Rating</th><th>PPG</th><th>PER</th><th>TS%</th><th>EPM</th><th>BPM</th><th>WS/48</th><th>On/Off</th><th>Clutch</th><th>Context</th></tr>
  ${team.players.map(p => {
    const isOut = scenarioState[sid] && scenarioState[sid][p.name] === 'out';
    const effRating = getEffectiveRating(p, sid);
    const escapedName = p.name.replace(/'/g, "\\'");
    return `<tr class="${isOut ? 'player-row-out' : ''}"><td><span class="player-toggle ${isOut ? 'toggled-out' : ''}" onclick="togglePlayer('${sid}','${escapedName}')">${isOut ? '\u2717' : '\u2713'}</span></td><td><span class="player-name">${p.name}</span><span class="pos-badge">${p.pos}</span>${p.injury?'<span class="injury-tag">'+p.injury.split('\u2014')[0].trim()+'</span>':''}</td>
  <td><span class="rating-pill ${getRatingClass(effRating)}">${effRating>0?effRating:'OUT'}</span></td>
  <td>${p.ppg}</td><td class="adv-cell">${p.per}</td><td class="adv-cell">${p.ts}%</td><td class="adv-cell" style="color:${p.epm>=5?'var(--green)':p.epm>=2?'var(--accent)':p.epm>=0?'var(--yellow)':'var(--red)'}">${p.epm>0?'+':''}${p.epm}</td>
  <td class="adv-cell">${p.bpm>0?'+':''}${p.bpm}</td><td class="adv-cell">${p.ws48}</td><td class="adv-cell" style="color:${p.onOff>=5?'var(--green)':p.onOff>=2?'var(--accent)':p.onOff>=0?'var(--yellow)':'var(--red)'}">${p.onOff>0?'+':''}${p.onOff}</td>
  <td class="adv-cell">${p.clutch}</td><td class="factor-cell"><span class="factor-note">${p.matchupNote}</span></td></tr>`;
  }).join('')}</table></div>${renderHistoricalImpact(team, sid)}</div>`;
}

function renderHistoricalImpact(team, seriesId) {
  const histTeam = HISTORICAL_WITHOUT[team.abbr];
  if (!histTeam) return '';
  const toggledOut = team.players.filter(p => {
    const br = p.baseRating || p.rating || 0;
    return br > 0 && scenarioState[seriesId] && scenarioState[seriesId][p.name] === 'out' && histTeam[p.name];
  });
  if (!toggledOut.length) return '';
  return `<div class="hist-impact-section">
    <div class="hist-impact-title">Historical Without-Star Data (2025-26 Season)</div>
    ${toggledOut.map(p => {
      const h = histTeam[p.name];
      const winColor = h.winPct >= .600 ? 'var(--green)' : h.winPct >= .450 ? 'var(--yellow)' : 'var(--red)';
      const nrColor = h.netRtgSwing >= 0 ? 'var(--green)' : h.netRtgSwing >= -5 ? 'var(--yellow)' : 'var(--red)';
      return `<div class="hist-impact-card">
        <div class="hist-player-header"><span class="player-name">${p.name}</span><span class="hist-record" style="color:${winColor}">Record without: ${h.record} (${(h.winPct*100).toFixed(0)}%)</span><span class="hist-netrtg" style="color:${nrColor}">NetRtg swing: ${h.netRtgSwing > 0 ? '+' : ''}${h.netRtgSwing}</span></div>
        <div class="hist-detail"><strong>Who steps up:</strong> ${h.stepUp}</div>
        <div class="hist-detail"><strong>Coach adjustment:</strong> ${h.coachAdj}</div>
        <div class="hist-detail"><strong>Playoff parallel:</strong> ${h.playoffNote}</div>
        <div class="hist-sources">Sources: ${h.sources.join(', ')}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderSynergy(team) {
  return `<div class="synergy-section"><div class="synergy-title">${team.name} — Lineup Synergy</div>
  ${team.synergy.map(s=>`<div class="lineup-row"><div class="lineup-players">${s.players.map(p=>`<span class="lineup-player-chip">${p}</span>`).join('')}</div><div class="synergy-score"><span class="rating-pill ${getRatingClass(s.score)}">${s.score}</span></div><div class="synergy-note">${s.note}</div></div>`).join('')}</div>`;
}

// SPM Chemistry Rendering
function renderSPMChemistry(series) {
  const hChem = getCachedSPM(series.homeTeam, series.id);
  const aChem = getCachedSPM(series.awayTeam, series.id);

  function renderTeamSPM(team, chem) {
    const active = team.players.filter(p=>p.rating>0).slice(0,8);
    // Aggregate skill profile for the lineup
    const agg = { oScr:0, oBH:0, oReb:0, dScr:0, dBH:0, dReb:0 };
    active.forEach(p => {
      const sk = inferSPMSkills(p);
      agg.oScr += sk.oScr; agg.oBH += sk.oBH; agg.oReb += sk.oReb;
      agg.dScr += sk.dScr; agg.dBH += sk.dBH; agg.dReb += sk.dReb;
    });
    // Normalize to 0-10 per player average
    const n = active.length || 1;
    Object.keys(agg).forEach(k => agg[k] = +(agg[k]/n).toFixed(1));

    const chemColor = chem.score >= 70 ? 'var(--green)' : chem.score >= 55 ? 'var(--accent)' : chem.score >= 45 ? 'var(--yellow)' : 'var(--red)';

    return `<div class="spm-team-card">
      <div class="spm-team-name"><span class="team-color-bar" style="background:${team.color};width:4px;height:14px;border-radius:2px;display:inline-block"></span>${team.name} Rotation (Top 8)</div>
      <div class="spm-skill-row"><span class="spm-skill-label">Off. Scoring</span><div class="spm-meter"><div class="spm-meter-fill" style="width:${agg.oScr*10}%;background:var(--accent)"></div></div><span class="spm-skill-val">${agg.oScr}</span></div>
      <div class="spm-skill-row"><span class="spm-skill-label">Off. Ball-Hndl</span><div class="spm-meter"><div class="spm-meter-fill" style="width:${agg.oBH*10}%;background:var(--purple)"></div></div><span class="spm-skill-val">${agg.oBH}</span></div>
      <div class="spm-skill-row"><span class="spm-skill-label">Off. Rebound</span><div class="spm-meter"><div class="spm-meter-fill" style="width:${agg.oReb*10}%;background:var(--yellow)"></div></div><span class="spm-skill-val">${agg.oReb}</span></div>
      <div class="spm-skill-row"><span class="spm-skill-label">Def. Scoring</span><div class="spm-meter"><div class="spm-meter-fill" style="width:${agg.dScr*10}%;background:var(--green)"></div></div><span class="spm-skill-val">${agg.dScr}</span></div>
      <div class="spm-skill-row"><span class="spm-skill-label">Def. Ball-Hndl</span><div class="spm-meter"><div class="spm-meter-fill" style="width:${agg.dBH*10}%;background:var(--accent2)"></div></div><span class="spm-skill-val">${agg.dBH}</span></div>
      <div class="spm-skill-row"><span class="spm-skill-label">Def. Rebound</span><div class="spm-meter"><div class="spm-meter-fill" style="width:${agg.dReb*10}%;background:var(--text-dim)"></div></div><span class="spm-skill-val">${agg.dReb}</span></div>
      <div class="spm-chem-score">
        <div class="label">SPM Chemistry</div>
        <div class="val" style="color:${chemColor}">${chem.score}</div>
        <div class="spm-verdict" style="color:${chemColor}">${chem.verdict}</div>
      </div>
      ${chem.synergies.length ? `<div class="spm-synergy-bar" style="flex-wrap:wrap;margin-top:8px">${chem.synergies.map(syn => `<span class="spm-synergy-chip ${syn.type}" title="${syn.pair}: ${syn.value>0?'+':''}${syn.value} pts/game">${syn.pair} ${syn.value>0?'+':''}${syn.value}</span>`).join('')}</div>` : ''}
    </div>`;
  }

  return `<div class="spm-section">
    <div class="spm-title">SPM Chemistry Analysis</div>
    <div class="spm-subtitle">Based on Maymin, Maymin & Shen (IJCSS 2013) — Skills Plus Minus framework measuring skill complementarity vs. redundancy</div>
    <div class="spm-grid">
      ${renderTeamSPM(series.homeTeam, hChem)}
      ${renderTeamSPM(series.awayTeam, aChem)}
    </div>
  </div>`;
}

// On/Off Impact Rendering
function renderOnOffImpact(series) {
  function renderTeamOnOff(team) {
    const summary = calcOnOffSummary(team);
    return `<div class="onoff-team">
      <div class="onoff-team-name" style="display:flex;align-items:center;gap:6px"><span style="width:4px;height:14px;border-radius:2px;background:${team.color};display:inline-block"></span>${team.name} <span style="font-size:10px;color:var(--text-dim);font-weight:400">Avg On/Off: <span style="color:${summary.avg>=3?'var(--green)':summary.avg>=1?'var(--accent)':summary.avg>=0?'var(--yellow)':'var(--red)'};font-weight:700">${summary.avg>0?'+':''}${summary.avg}</span></span></div>
      ${summary.players.map(p => {
        const barWidth = Math.min(100, Math.abs(p.onOff) * 8);
        const barColor = p.onOff >= 5 ? 'var(--green)' : p.onOff >= 2 ? 'var(--accent)' : p.onOff >= 0 ? 'var(--yellow)' : 'var(--red)';
        return `<div class="onoff-player">
          <span class="onoff-name">${p.name}</span>
          <div style="display:flex;align-items:center;gap:4px">
            <span class="onoff-val" style="color:${barColor}">${p.onOff>0?'+':''}${p.onOff}</span>
            <div class="onoff-bar"><div class="onoff-bar-fill" style="width:${barWidth}%;background:${barColor}"></div></div>
          </div>
        </div>`;
      }).join('')}
      <div style="margin-top:8px;font-size:10px;color:var(--text-dim)">Swing: <strong style="color:var(--text)">${summary.swing}</strong> (${summary.top.name} ${summary.top.onOff>0?'+':''}${summary.top.onOff} to ${summary.worst.name} ${summary.worst.onOff>0?'+':''}${summary.worst.onOff})</div>
    </div>`;
  }

  return `<div class="onoff-section">
    <div class="onoff-title">On/Off Court Impact <span style="font-size:10px;color:var(--text-dim);font-weight:400;margin-left:8px">Net Rating swing when player is on vs. off court (source: Basketball-Reference, FantasyLabs)</span></div>
    <div class="onoff-grid">
      ${renderTeamOnOff(series.homeTeam)}
      ${renderTeamOnOff(series.awayTeam)}
    </div>
  </div>`;
}

function renderCoaching(series) {
  const c = series.coaching;
  if (!c) return '';

  function renderCoachCard(coachData, team) {
    return `<div class="coach-card">
      <div class="coach-name">
        <span style="width:4px;height:18px;border-radius:2px;background:${team.color};display:inline-block"></span>
        ${coachData.coach}
        <span class="coach-label">${team.name} HC</span>
      </div>
      <div class="coach-record">Playoff Record: <strong>${coachData.playoffRecord}</strong></div>
      <div class="coach-tendency"><strong>Tendency:</strong> ${coachData.tendency}</div>
      <div class="coach-detail">
        <div class="coach-detail-label">Rotation Plan</div>
        ${coachData.rotationPlan}
      </div>
      <div class="coach-detail">
        <div class="coach-detail-label">Key Adjustment</div>
        ${coachData.keyAdjustment}
      </div>
    </div>`;
  }

  function renderLineupRow(lineupData, teamAbbr) {
    const nrColor = lineupData.netRtg >= 10 ? 'var(--green)' : lineupData.netRtg >= 5 ? 'var(--accent)' : lineupData.netRtg >= 0 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="lineup-stat-row">
      <div class="team-label" style="color:${nrColor}">${teamAbbr}</div>
      <div class="lineup-players-list">${lineupData.players.map(p => '<span class="lineup-player-chip">' + p + '</span>').join('')}</div>
      <div class="lineup-stats">
        <div class="ls"><div class="ls-label">Net</div><div class="ls-val" style="color:${nrColor}">${lineupData.netRtg > 0 ? '+' : ''}${lineupData.netRtg}</div></div>
        <div class="ls"><div class="ls-label">ORtg</div><div class="ls-val">${lineupData.ortg}</div></div>
        <div class="ls"><div class="ls-label">DRtg</div><div class="ls-val">${lineupData.drtg}</div></div>
        <div class="ls"><div class="ls-label">Min</div><div class="ls-val">${lineupData.min}</div></div>
      </div>
      <div class="lineup-note">${lineupData.note}</div>
    </div>`;
  }

  function renderRoleChange(rc) {
    const arrowSymbol = rc.impact === 'up' ? '\u2191' : rc.impact === 'down' ? '\u2193' : '\u2192';
    const arrowClass = rc.impact === 'up' ? 'up' : rc.impact === 'down' ? 'down' : 'same';
    return `<div class="role-change-item">
      <div class="rc-player">${rc.player}<span class="rc-team">${rc.team}</span></div>
      <div class="rc-arrow ${arrowClass}">${arrowSymbol}</div>
      <div class="rc-roles">
        <div class="rc-from">${rc.regSeason}</div>
        <div class="rc-to">${arrowSymbol} ${rc.playoff}</div>
        <div class="rc-reason">${rc.reason}</div>
      </div>
    </div>`;
  }

  return `<div class="coaching-section">

}

// Edge helpers — factory pattern eliminates duplication
function makeEdge(getH, getA, threshold, fmt) {
  return {
    edge(s) { const h=getH(s),a=getA(s),d=h-a; return Math.abs(d)<=threshold?(threshold>1?'Even':'Even'):`${d>0?s.homeTeam.abbr:s.awayTeam.abbr} +${fmt?fmt(Math.abs(d)):Math.abs(d)}`; },
    note(s) { return null; } // override per-helper below
  };
}
const fmtDec = v => v.toFixed(1);
const fmtInt = v => Math.round(v);

// Individual edge/note functions using factory
function getBestPlayerEdge(s) { const h=Math.max(...s.homeTeam.players.map(p=>p.rating)),a=Math.max(...s.awayTeam.players.map(p=>p.rating)),d=h-a; return Math.abs(d)<=2?'Even':`${d>0?s.homeTeam.abbr:s.awayTeam.abbr} +${Math.abs(d)}`; }
function getBestPlayerNote(s) { const h=s.homeTeam.players.reduce((a,b)=>a.rating>b.rating?a:b),a=s.awayTeam.players.reduce((x,b)=>x.rating>b.rating?x:b); return `${h.name} (${h.rating}) vs ${a.name} (${a.rating})`; }

function getStatEdge(s, statFn, threshold, fmt) {
  const h = statFn(s.homeTeam, s), a = statFn(s.awayTeam, s), d = h - a;
  return Math.abs(d) <= threshold ? 'Even' : `${d>0?s.homeTeam.abbr:s.awayTeam.abbr} +${fmt ? fmt(Math.abs(d)) : Math.abs(d)}`;
}
function getStatNote(s, statFn, label, fmt) {
  const h = statFn(s.homeTeam, s), a = statFn(s.awayTeam, s);
  const fH = fmt ? fmt(h) : h, fA = fmt ? fmt(a) : a;
  return `${s.homeTeam.abbr}: ${h>0?'+':''}${fH} vs ${s.awayTeam.abbr}: ${a>0?'+':''}${fA}`;
}

const _epm = t => Math.max(...t.players.map(p=>p.epm));
const _syn = t => Math.max(...t.synergy.map(l=>l.score));
const _clutch = t => t.advStats.clutchNetRtg;
const _spm = (t,s) => getCachedSPM(t,s.id).score;
const _onoff = t => calcOnOffSummary(t).avg;
const _ext = (t,s) => s.externalFactors.filter(f=>f.team===t.abbr).reduce((a,f)=>a+f.impact,0);

function getEPMEdge(s) { return getStatEdge(s, _epm, 0.5, fmtDec); }
function getEPMNote(s) { const h=s.homeTeam.players.reduce((a,b)=>a.epm>b.epm?a:b),a=s.awayTeam.players.reduce((x,b)=>x.epm>b.epm?x:b); return `${h.name} (${h.epm>0?'+':''}${h.epm}) vs ${a.name} (${a.epm>0?'+':''}${a.epm})`; }
function getSynergyEdge(s) { return getStatEdge(s, _syn, 3); }
function getSynergyNote(s) { return `${s.homeTeam.abbr}: ${_syn(s.homeTeam)} vs ${s.awayTeam.abbr}: ${_syn(s.awayTeam)}`; }
function getClutchEdge(s) { return getStatEdge(s, _clutch, 1, fmtDec); }
function getClutchNote(s) { return getStatNote(s, _clutch, 'clutch', fmtDec); }
function getSPMEdge(s) { return getStatEdge(s, _spm, 3); }
function getSPMNote(s) { return `${s.homeTeam.abbr}: ${_spm(s.homeTeam,s)} vs ${s.awayTeam.abbr}: ${_spm(s.awayTeam,s)}`; }
function getOnOffEdge(s) { return getStatEdge(s, _onoff, 0.5, fmtDec); }
function getOnOffNote(s) { return `${s.homeTeam.abbr}: ${_onoff(s.homeTeam)>0?'+':''}${_onoff(s.homeTeam)} avg | ${s.awayTeam.abbr}: ${_onoff(s.awayTeam)>0?'+':''}${_onoff(s.awayTeam)} avg`; }
function getExternalEdge(s) { const h=_ext(s.homeTeam,s),a=_ext(s.awayTeam,s),d=h-a; return Math.abs(d)<=2?'Neutral':`${d>0?s.homeTeam.abbr:s.awayTeam.abbr} ${d>0?'+'+d:d}`; }
function getExternalNote(s) { return `${s.homeTeam.abbr}: ${_ext(s.homeTeam,s)>0?'+':''}${_ext(s.homeTeam,s)} | ${s.awayTeam.abbr}: ${_ext(s.awayTeam,s)>0?'+':''}${_ext(s.awayTeam,s)}`; }

function renderLearningsPage(el) {

        <span class="learning-tag model">Chemistry</span>
      </div>

      <div class="learning-entry insight">
        <div class="learning-phase">Phase 2 — Game 1 Predictions</div>
        <div class="learning-title">Home Court Was Initially Set to a Flat +3</div>
        <div class="learning-body">The original model used a flat <strong>+3 HCA</strong> across all situations. This was based on regular-season data showing home teams win ~58% of games, which translates to roughly 3 points of expected advantage. This assumption would later prove too aggressive for later playoff rounds but was adequate for Round 1 predictions.</div>
        <span class="learning-tag model">HCA</span>
      </div>

      <div class="learning-entry correction">
        <div class="learning-phase">Phase 2 — Game 1 Results</div>
        <div class="learning-title">HOU-LAL Home Court Assignment Error</div>
        <div class="learning-body">LAL (4 seed, 53-29) should have had home court over HOU (5 seed, 52-30), but HOU was listed as homeTeam in the data. Rather than restructuring hundreds of lines, we added <strong>homeCourtOverride: "away"</strong> which inverts HCA at calculation time. This alone swung LAL's win probability from ~16% to ~32% — a massive correction that validated how sensitive the model is to HCA direction.</div>
        <span class="learning-tag bug">Bug Fix</span><span class="learning-tag model">HCA</span>
      </div>

      <div class="learning-entry correction">
        <div class="learning-phase">Phase 2 — Game 1 Results</div>
        <div class="learning-title">Ghost Calculation: Baseline Injuries Double-Counted</div>
        <div class="learning-body">Three separate ghost calculations were discovered and fixed: (1) <strong>HISTORICAL_WITHOUT</strong> was applying netRtgSwing corrections to players already injured at baseline, double-penalizing the team. (2) <strong>advScale</strong> was counting baseline-injured players in its "out count," over-reducing advanced stats bonuses. (3) <strong>Compounding star penalty</strong> (-2.5 per star) was firing for already-injured stars + scenario-toggled stars combined. All three were fixed with the <strong>isBaselineInjured / isScenarioToggled</strong> helper pattern that cleanly separates "what the model starts with" from "what the user toggles."</div>

        <span class="learning-tag backtest">Backtest</span><span class="learning-tag model">System Coherence</span>
