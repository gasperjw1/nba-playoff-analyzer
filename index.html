<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NBA Playoff Analyzer — Advanced Edition</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="header">
  <h1><span>2026</span> NBA Playoff Analyzer<span class="header-sub">Advanced Metrics Edition</span></h1>
  <div class="header-right">
    <div class="legend">
      <span><span class="legend-dot" style="background:var(--green)"></span>Elite 85+</span>
      <span><span class="legend-dot" style="background:var(--accent)"></span>High 70-84</span>
      <span><span class="legend-dot" style="background:var(--yellow)"></span>Mid 55-69</span>
      <span><span class="legend-dot" style="background:var(--red)"></span>Low &lt;55</span>
      <span><span class="legend-dot" style="background:var(--purple)"></span>Game 1 Pick</span>
    </div>
  </div>
</div>

<div class="page-nav" id="pageNav">
  <button class="page-nav-btn active" onclick="switchPage('series')">Series Analysis</button>
  <button class="page-nav-btn" onclick="switchPage('learnings')">Model Learnings</button>
  <button class="page-nav-btn" onclick="switchPage('definitions')">Definitions</button>
  <button class="page-nav-btn" onclick="switchPage('bets')">Bets (All 8)</button>
</div>
<div class="tabs" id="tabs"></div>
<div class="main" id="main"></div>

<!-- Game Result Modal -->
<div class="modal-overlay" id="gameModal">
  <div class="modal">
    <h2 id="modalTitle">Update Game Result</h2>
    <label>Winning Team</label>
    <select id="modalWinner"></select>
    <label>Score (Winner)</label>
    <input type="number" id="modalScoreW" placeholder="e.g. 112">
    <label>Score (Loser)</label>
    <input type="number" id="modalScoreL" placeholder="e.g. 104">
    <label>Notable Performances (optional)</label>
    <textarea id="modalNotes" placeholder="e.g. LeBron 38pts 12reb, KD struggled 14pts on 5/19 shooting"></textarea>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="saveGameResult()">Save Result</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- External Factor Modal -->
<div class="modal-overlay" id="factorModal">
  <div class="modal">
    <h2>Add External Factor</h2>
    <label>Team</label>
    <select id="factorTeam"></select>
    <label>Player Affected (optional)</label>
    <input type="text" id="factorPlayer" placeholder="e.g. Kevin Durant">
    <label>Factor Description</label>
    <textarea id="factorDesc" placeholder="e.g. Locker room tension after social media controversy"></textarea>
    <label>Impact on Rating</label>
    <select id="factorImpact">
      <option value="-10">Major Negative (-10)</option>
      <option value="-5">Moderate Negative (-5)</option>
      <option value="-3" selected>Minor Negative (-3)</option>
      <option value="0">Neutral (0)</option>
      <option value="3">Minor Positive (+3)</option>
      <option value="5">Moderate Positive (+5)</option>
      <option value="10">Major Positive (+10)</option>
    </select>
    <label>Category</label>
    <select id="factorCategory">
      <option value="personal">Personal / Off-Court</option>
      <option value="injury">Injury / Health</option>
      <option value="chemistry">Team Chemistry</option>
      <option value="motivation">Motivation / Narrative</option>
      <option value="role">Role Change</option>
    </select>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="saveExternalFactor()">Add Factor</button>
      <button class="btn btn-secondary" onclick="closeFactorModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- Scripts loaded in dependency order                            -->
<!-- ============================================================ -->

<!-- Data layer (no dependencies) -->
<script src="js/data/constants.js"></script>
<script src="js/data/series-data.js"></script>
<script src="js/data/historical.js"></script>

<!-- Utilities & state (depends on data) -->
<script src="js/utils.js"></script>
<script src="js/state.js"></script>

<!-- Calculation engine (depends on data + state + utils) -->
<script src="js/engine/fatigue.js"></script>
<script src="js/engine/chemistry.js"></script>
<script src="js/engine/matchups.js"></script>
<script src="js/engine/ratings.js"></script>
<script src="js/engine/projections.js"></script>

<!-- UI layer (depends on engine + state) -->
<script src="js/ui/components.js"></script>
<script src="js/ui/modals.js"></script>
<script src="js/ui/series-renderer.js"></script>
<script src="js/ui/learnings.js"></script>
<script src="js/ui/definitions.js"></script>
<script src="js/ui/bets.js"></script>
<script src="js/ui/navigation.js"></script>

<!-- Boot -->
<script src="js/app.js"></script>

</body>
</html>
