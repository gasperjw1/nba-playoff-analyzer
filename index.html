}

function renderRosterTable(team, series) {
  const sid = series.id;
  return `<div class="roster-section"><div class="roster-title"><span class="team-color" style="background:${team.color}"></span>${team.city} ${team.name} — Player Ratings (Advanced) <span style="font-size:10px;color:var(--text-dim);font-weight:400;margin-left:8px">Click toggles to build scenarios</span></div>
  <div style="overflow-x:auto"><table><tr><th></th><th>Player</th><th>Rating</th><th>PPG</th><th>PER</th><th>TS%</th><th>EPM</th><th>BPM</th><th>WS/48</th><th>On/Off</th><th>Clutch</th><th>Context</th></tr>
  ${team.players.map(p => {
    const isOut = scenarioState[sid] && scenarioState[sid][p.name] === 'out';
    const effRating = getEffectiveRating(p, sid);
    const escapedName = p.name.replace(/'/g, "\\'");
    return `<tr class="${isOut ? 'player-row-out' : ''}"><td><span class="player-toggle ${isOut ? 'toggled-out' : ''}" onclick="togglePlayer('${sid}','${escapedName}')">${isOut ? '\u2717' : '\u2713'}</span></td><td><span class="player-name">${p.name}</span><span class="pos-badge">${p.pos}</span>${p.injury?'<span class="injury-tag">'+p.injury.split('\u2014')[0].trim()+'</span>':''}</td>
  <td><span class="rating-pill ${getRatingClass(effRating)}">${effRating>0?effRating:'OUT'}</span></td>
  <td>${p.ppg}</td><td class="adv-cell">${p.per}</td><td class="adv-cell">${p.ts}%</td><td class="adv-cell" style="color:${p.epm>=5?'var(--green)':p.epm>=2?'var(--accent)':p.epm>=0?'var(--yellow)':'var(--red)'}">${p.epm>0?'+':''}${p.epm}</td>
  <td class="adv-cell">${p.bpm>0?'+':''}${p.bpm}</td><td class="adv-cell">${p.ws48}</td><td class="adv-cell" style="color:${p.onOff>=5?'var(--green)':p.onOff>=2?'var(--accent)':p.onOff>=0?'var(--yellow)':'var(--red)'}">${p.onOff>0?'+':''}${p.onOff}</td>
  <td class="adv-cell">${p.clutch}</td><td class="factor-cell"><span class="factor-note">${p.matchupNote}</span></td></tr>`;
  }).join('')}</table></div>${renderHistoricalImpact(team, sid)}</div>`;
}

function renderHistoricalImpact(team, seriesId) {
  const histTeam = HISTORICAL_WITHOUT[team.abbr];
  if (!histTeam) return '';
  const toggledOut = team.players.filter(p => {
    const br = p.baseRating || p.rating || 0;
    return br > 0 && scenarioState[seriesId] && scenarioState[seriesId][p.name] === 'out' && histTeam[p.name];
  });
  if (!toggledOut.length) return '';
  return `<div class="hist-impact-section">
    <div class="hist-impact-title">Historical Without-Star Data (2025-26 Season)</div>
    ${toggledOut.map(p => {
      const h = histTeam[p.name];
      const winColor = h.winPct >= .600 ? 'var(--green)' : h.winPct >= .450 ? 'var(--yellow)' : 'var(--red)';
      const nrColor = h.netRtgSwing >= 0 ? 'var(--green)' : h.netRtgSwing >= -5 ? 'var(--yellow)' : 'var(--red)';
      return `<div class="hist-impact-card">
        <div class="hist-player-header"><span class="player-name">${p.name}</span><span class="hist-record" style="color:${winColor}">Record without: ${h.record} (${(h.winPct*100).toFixed(0)}%)</span><span class="hist-netrtg" style="color:${nrColor}">NetRtg swing: ${h.netRtgSwing > 0 ? '+' : ''}${h.netRtgSwing}</span></div>
        <div class="hist-detail"><strong>Who steps up:</strong> ${h.stepUp}</div>
        <div class="hist-detail"><strong>Coach adjustment:</strong> ${h.coachAdj}</div>
        <div class="hist-detail"><strong>Playoff parallel:</strong> ${h.playoffNote}</div>
        <div class="hist-sources">Sources: ${h.sources.join(', ')}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderSynergy(team) {
  return `<div class="synergy-section"><div class="synergy-title">${team.name} — Lineup Synergy</div>
  ${team.synergy.map(s=>`<div class="lineup-row"><div class="lineup-players">${s.players.map(p=>`<span class="lineup-player-chip">${p}</span>`).join('')}</div><div class="synergy-score"><span class="rating-pill ${getRatingClass(s.score)}">${s.score}</span></div><div class="synergy-note">${s.note}</div></div>`).join('')}</div>`;
}

// SPM Chemistry Rendering
function renderSPMChemistry(series) {
  const hChem = getCachedSPM(series.homeTeam, series.id);
  const aChem = getCachedSPM(series.awayTeam, series.id);

  function renderTeamSPM(team, chem) {
    const active = team.players.filter(p=>p.rating>0).slice(0,8);
    // Aggregate skill profile for the lineup
    const agg = { oScr:0, oBH:0, oReb:0, dScr:0, dBH:0, dReb:0 };
    active.forEach(p => {
      const sk = inferSPMSkills(p);
      agg.oScr += sk.oScr; agg.oBH += sk.oBH; agg.oReb += sk.oReb;
      agg.dScr += sk.dScr; agg.dBH += sk.dBH; agg.dReb += sk.dReb;
    });
    // Normalize to 0-10 per player average
    const n = active.length || 1;
    Object.keys(agg).forEach(k => agg[k] = +(agg[k]/n).toFixed(1));

    const chemColor = chem.score >= 70 ? 'var(--green)' : chem.score >= 55 ? 'var(--accent)' : chem.score >= 45 ? 'var(--yellow)' : 'var(--red)';

    return `<div class="spm-team-card">
      <div class="spm-team-name"><span class="team-color-bar" style="background:${team.color};width:4px;height:14px;border-radius:2px;display:inline-block"></span>${team.name} Rotation (Top 8)</div>
      <div class="spm-skill-row"><span class="spm-skill-label">Off. Scoring</span><div class="spm-meter"><div class="spm-meter-fill" style="width:${agg.oScr*10}%;background:var(--accent)"></div></div><span class="spm-skill-val">${agg.oScr}</span></div>
      <div class="spm-skill-row"><span class="spm-skill-label">Off. Ball-Hndl</span><div class="spm-meter"><div class="spm-meter-fill" style="width:${agg.oBH*10}%;background:var(--purple)"></div></div><span class="spm-skill-val">${agg.oBH}</span></div>
      <div class="spm-skill-row"><span class="spm-skill-label">Off. Rebound</span><div class="spm-meter"><div class="spm-meter-fill" style="width:${agg.oReb*10}%;background:var(--yellow)"></div></div><span class="spm-skill-val">${agg.oReb}</span></div>
      <div class="spm-skill-row"><span class="spm-skill-label">Def. Scoring</span><div class="spm-meter"><div class="spm-meter-fill" style="width:${agg.dScr*10}%;background:var(--green)"></div></div><span class="spm-skill-val">${agg.dScr}</span></div>
      <div class="spm-skill-row"><span class="spm-skill-label">Def. Ball-Hndl</span><div class="spm-meter"><div class="spm-meter-fill" style="width:${agg.dBH*10}%;background:var(--accent2)"></div></div><span class="spm-skill-val">${agg.dBH}</span></div>
      <div class="spm-skill-row"><span class="spm-skill-label">Def. Rebound</span><div class="spm-meter"><div class="spm-meter-fill" style="width:${agg.dReb*10}%;background:var(--text-dim)"></div></div><span class="spm-skill-val">${agg.dReb}</span></div>
      <div class="spm-chem-score">
        <div class="label">SPM Chemistry</div>
        <div class="val" style="color:${chemColor}">${chem.score}</div>
        <div class="spm-verdict" style="color:${chemColor}">${chem.verdict}</div>
      </div>
      ${chem.synergies.length ? `<div class="spm-synergy-bar" style="flex-wrap:wrap;margin-top:8px">${chem.synergies.map(syn => `<span class="spm-synergy-chip ${syn.type}" title="${syn.pair}: ${syn.value>0?'+':''}${syn.value} pts/game">${syn.pair} ${syn.value>0?'+':''}${syn.value}</span>`).join('')}</div>` : ''}
    </div>`;
  }

  return `<div class="spm-section">
    <div class="spm-title">SPM Chemistry Analysis</div>
    <div class="spm-subtitle">Based on Maymin, Maymin & Shen (IJCSS 2013) — Skills Plus Minus framework measuring skill complementarity vs. redundancy</div>
    <div class="spm-grid">
      ${renderTeamSPM(series.homeTeam, hChem)}
      ${renderTeamSPM(series.awayTeam, aChem)}
    </div>
  </div>`;
}

// On/Off Impact Rendering
function renderOnOffImpact(series) {

      ${summary.players.map(p => {
        const barWidth = Math.min(100, Math.abs(p.onOff) * 8);
        const barColor = p.onOff >= 5 ? 'var(--green)' : p.onOff >= 2 ? 'var(--accent)' : p.onOff >= 0 ? 'var(--yellow)' : 'var(--red)';
        return `<div class="onoff-player">
          <span class="onoff-name">${p.name}</span>
          <div style="display:flex;align-items:center;gap:4px">
            <span class="onoff-val" style="color:${barColor}">${p.onOff>0?'+':''}${p.onOff}</span>
            <div class="onoff-bar"><div class="onoff-bar-fill" style="width:${barWidth}%;background:${barColor}"></div></div>
          </div>

      }).join('')}
      <div style="margin-top:8px;font-size:10px;color:var(--text-dim)">Swing: <strong style="color:var(--text)">${summary.swing}</strong> (${summary.top.name} ${summary.top.onOff>0?'+':''}${summary.top.onOff} to ${summary.worst.name} ${summary.worst.onOff>0?'+':''}${summary.worst.onOff})</div>

  }

  return `<div class="onoff-section">
    <div class="onoff-title">On/Off Court Impact <span style="font-size:10px;color:var(--text-dim);font-weight:400;margin-left:8px">Net Rating swing when player is on vs. off court (source: Basketball-Reference, FantasyLabs)</span></div>

        ${coachData.coach}

      </div>
      <div class="coach-detail">
        <div class="coach-detail-label">Key Adjustment</div>
        ${coachData.keyAdjustment}
      </div>
    </div>`;
  }

  function renderLineupRow(lineupData, teamAbbr) {
    const nrColor = lineupData.netRtg >= 10 ? 'var(--green)' : lineupData.netRtg >= 5 ? 'var(--accent)' : lineupData.netRtg >= 0 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="lineup-stat-row">
      <div class="team-label" style="color:${nrColor}">${teamAbbr}</div>
      <div class="lineup-players-list">${lineupData.players.map(p => '<span class="lineup-player-chip">' + p + '</span>').join('')}</div>
      <div class="lineup-stats">
        <div class="ls"><div class="ls-label">Net</div><div class="ls-val" style="color:${nrColor}">${lineupData.netRtg > 0 ? '+' : ''}${lineupData.netRtg}</div></div>
        <div class="ls"><div class="ls-label">ORtg</div><div class="ls-val">${lineupData.ortg}</div></div>
        <div class="ls"><div class="ls-label">DRtg</div><div class="ls-val">${lineupData.drtg}</div></div>
        <div class="ls"><div class="ls-label">Min</div><div class="ls-val">${lineupData.min}</div></div>
      </div>
      <div class="lineup-note">${lineupData.note}</div>
    </div>`;
  }

  function renderRoleChange(rc) {
    const arrowSymbol = rc.impact === 'up' ? '\u2191' : rc.impact === 'down' ? '\u2193' : '\u2192';
    const arrowClass = rc.impact === 'up' ? 'up' : rc.impact === 'down' ? 'down' : 'same';
    return `<div class="role-change-item">
      <div class="rc-player">${rc.player}<span class="rc-team">${rc.team}</span></div>
      <div class="rc-arrow ${arrowClass}">${arrowSymbol}</div>
      <div class="rc-roles">
        <div class="rc-from">${rc.regSeason}</div>
        <div class="rc-to">${arrowSymbol} ${rc.playoff}</div>
        <div class="rc-reason">${rc.reason}</div>
      </div>
    </div>`;
  }

  return `<div class="coaching-section">
    <div class="coaching-title">Coaching & Lineup Intelligence</div>
    <div class="coaching-subtitle">Coach tendencies, top lineups, and predicted role changes for this series</div>

      ${renderCoachCard(c.home, series.homeTeam)}
      ${renderCoachCard(c.away, series.awayTeam)}
    </div>

    <div class="lineup-data-section">

      ${renderLineupRow(c.bestLineups.home, series.homeTeam.abbr)}
      ${renderLineupRow(c.bestLineups.away, series.awayTeam.abbr)}
    </div>

    <div class="role-change-section">
      <div class="role-change-title">Playoff Role Change Predictions</div>
      ${c.roleChanges.map(rc => renderRoleChange(rc)).join('')}
    </div>
  </div>`;
}

// Edge helpers — factory pattern eliminates duplication
function makeEdge(getH, getA, threshold, fmt) {
  return {
    edge(s) { const h=getH(s),a=getA(s),d=h-a; return Math.abs(d)<=threshold?(threshold>1?'Even':'Even'):`${d>0?s.homeTeam.abbr:s.awayTeam.abbr} +${fmt?fmt(Math.abs(d)):Math.abs(d)}`; },
    note(s) { return null; } // override per-helper below
  };
}
const fmtDec = v => v.toFixed(1);
const fmtInt = v => Math.round(v);

// Individual edge/note functions using factory
function getBestPlayerEdge(s) { const h=Math.max(...s.homeTeam.players.map(p=>p.rating)),a=Math.max(...s.awayTeam.players.map(p=>p.rating)),d=h-a; return Math.abs(d)<=2?'Even':`${d>0?s.homeTeam.abbr:s.awayTeam.abbr} +${Math.abs(d)}`; }
function getBestPlayerNote(s) { const h=s.homeTeam.players.reduce((a,b)=>a.rating>b.rating?a:b),a=s.awayTeam.players.reduce((x,b)=>x.rating>b.rating?x:b); return `${h.name} (${h.rating}) vs ${a.name} (${a.rating})`; }

function getStatEdge(s, statFn, threshold, fmt) {
  const h = statFn(s.homeTeam, s), a = statFn(s.awayTeam, s), d = h - a;
  return Math.abs(d) <= threshold ? 'Even' : `${d>0?s.homeTeam.abbr:s.awayTeam.abbr} +${fmt ? fmt(Math.abs(d)) : Math.abs(d)}`;
}
function getStatNote(s, statFn, label, fmt) {
  const h = statFn(s.homeTeam, s), a = statFn(s.awayTeam, s);
  const fH = fmt ? fmt(h) : h, fA = fmt ? fmt(a) : a;
  return `${s.homeTeam.abbr}: ${h>0?'+':''}${fH} vs ${s.awayTeam.abbr}: ${a>0?'+':''}${fA}`;
}

const _epm = t => Math.max(...t.players.map(p=>p.epm));
const _syn = t => Math.max(...t.synergy.map(l=>l.score));
const _clutch = t => t.advStats.clutchNetRtg;
const _spm = (t,s) => getCachedSPM(t,s.id).score;
const _onoff = t => calcOnOffSummary(t).avg;
const _ext = (t,s) => s.externalFactors.filter(f=>f.team===t.abbr).reduce((a,f)=>a+f.impact,0);

function getEPMEdge(s) { return getStatEdge(s, _epm, 0.5, fmtDec); }
function getEPMNote(s) { const h=s.homeTeam.players.reduce((a,b)=>a.epm>b.epm?a:b),a=s.awayTeam.players.reduce((x,b)=>x.epm>b.epm?x:b); return `${h.name} (${h.epm>0?'+':''}${h.epm}) vs ${a.name} (${a.epm>0?'+':''}${a.epm})`; }
function getSynergyEdge(s) { return getStatEdge(s, _syn, 3); }
function getSynergyNote(s) { return `${s.homeTeam.abbr}: ${_syn(s.homeTeam)} vs ${s.awayTeam.abbr}: ${_syn(s.awayTeam)}`; }
function getClutchEdge(s) { return getStatEdge(s, _clutch, 1, fmtDec); }
function getClutchNote(s) { return getStatNote(s, _clutch, 'clutch', fmtDec); }
function getSPMEdge(s) { return getStatEdge(s, _spm, 3); }
function getSPMNote(s) { return `${s.homeTeam.abbr}: ${_spm(s.homeTeam,s)} vs ${s.awayTeam.abbr}: ${_spm(s.awayTeam,s)}`; }
function getOnOffEdge(s) { return getStatEdge(s, _onoff, 0.5, fmtDec); }
function getOnOffNote(s) { return `${s.homeTeam.abbr}: ${_onoff(s.homeTeam)>0?'+':''}${_onoff(s.homeTeam)} avg | ${s.awayTeam.abbr}: ${_onoff(s.awayTeam)>0?'+':''}${_onoff(s.awayTeam)} avg`; }
function getExternalEdge(s) { const h=_ext(s.homeTeam,s),a=_ext(s.awayTeam,s),d=h-a; return Math.abs(d)<=2?'Neutral':`${d>0?s.homeTeam.abbr:s.awayTeam.abbr} ${d>0?'+'+d:d}`; }
function getExternalNote(s) { return `${s.homeTeam.abbr}: ${_ext(s.homeTeam,s)>0?'+':''}${_ext(s.homeTeam,s)} | ${s.awayTeam.abbr}: ${_ext(s.awayTeam,s)>0?'+':''}${_ext(s.awayTeam,s)}`; }

        <span class="learning-tag backtest">Backtest</span><span class="learning-tag model">Fatigue</span>
      </div>

      <div class="learning-entry insight">
        <div class="learning-phase">Phase 4 — 2025 Backtest (Conference Finals)</div>

        <span class="learning-tag backtest">Backtest</span><span class="learning-tag model">Star Variance</span>
      </div>

      <div class="learning-entry insight">

        <span class="learning-tag backtest">Backtest</span><span class="learning-tag model">Psychology</span>

      <div class="learning-entry milestone">
        <div class="learning-phase">Phase 4 — 2025 Backtest (Complete)</div>
        <div class="learning-title">Full Backtest: 36/49 Games = 73.5% Accuracy</div>
        <div class="learning-body">Accuracy by round: <strong>R1: 87.5% → R2: 69.6% → CF: 72.7% → Finals: 71.4%</strong>. The declining accuracy in later rounds was the most important finding, driven by HCA decay, system matchups, and star ceiling variance. Seven lessons were extracted and codified into the model: round-adjusted HCA, bounce-back qualifier, system coherence bonus, championship DNA, health degradation curve, Game 7 override, and star ceiling variance.</div>
        <span class="learning-tag backtest">Backtest</span><span class="learning-tag milestone">Milestone</span>
      </div>

      <div class="learning-entry milestone">
        <div class="learning-phase">Phase 5 — Model v2 (Current)</div>
        <div class="learning-title">7 Backtest Lessons Implemented Into Live Model</div>
        <div class="learning-body">All seven lessons from the 2025 backtest are now <strong>live in the prediction engine</strong>:
        (1) <strong>Round-Adjusted HCA</strong>: R1=3.0, R2=2.0, CF=1.5, Finals=1.0.
        (2) <strong>Bounce-Back Qualifier</strong>: 77% base scaled by round and matchup quality.

        (5) <strong>Health Degradation</strong>: injuryRisk * round depth * 0.4 penalty.
        (6) <strong>Game 7 Override</strong>: +5.0 HCA when series is tied 3-3.
        (7) <strong>Star Ceiling Variance</strong>: starCeiling (0-2) adds upside variance to close matchups.

        <span class="learning-tag model">Model v2</span><span class="learning-tag backtest">Calibrated</span>
      </div>

      <div class="learning-entry milestone">
        <div class="learning-phase">Phase 6 — LEBRON Integration</div>
        <div class="learning-title">LEBRON / WAR / O-LEBRON / D-LEBRON Added to All 141 Players</div>
        <div class="learning-body">Integrated BBall Index's <strong>LEBRON ecosystem</strong> (Luck-adjusted player Estimate using a Box prior Regularized ON-off) from a comprehensive CSV dataset into every playoff player object. Four new fields per player: <strong>lebron</strong> (composite), <strong>oLebron</strong> (offensive), <strong>dLebron</strong> (defensive), and <strong>war</strong> (Wins Above Replacement). LEBRON is more predictive than raw plus-minus because it stabilizes noisy lineup data with box-score anchoring. WAR provides cumulative value context. These feed into calcTeamRating() via WAR aggregation bonus and D-LEBRON team aggregate, and into calcWinProb() via D-LEBRON matchup differential.</div>
        <span class="learning-tag data">LEBRON</span><span class="learning-tag model">Data Integration</span>
      </div>

      <div class="learning-entry correction">
        <div class="learning-phase">Phase 6 — Ghost Audit</div>
        <div class="learning-title">7 Ghost Calculations Found and Fixed</div>
        <div class="learning-body">A comprehensive audit revealed <strong>7 double-counting penalties</strong> (ghost calculations) across the model:
        (1) <strong>Health Degradation in calcTeamRating()</strong> was applying to R1 games despite being designed for R2+ depth-based decay — fixed with round > 1 guard.
        (2) <strong>Fatigue × injuryRisk overlap</strong>: fatigue system was reading injuryRisk directly, double-penalizing injury-prone players already hit by Health Degradation — removed injuryRisk from fatigue inputs.
        (3) <strong>VORP + WAR double-count</strong>: WAR is derived from LEBRON which correlates with VORP's BPM basis — reduced WAR weight to 0.3 and capped combined bonus.
        (4) <strong>D-LEBRON triple-count</strong>: D-LEBRON appeared in calcTeamRating() aggregate, calcWinProb() matchup diff, AND player composite rating — removed from calcWinProb() to keep it in one subsystem.
        (5-7) Three scenario toggle issues where <strong>getEffectiveRating()</strong> wasn't being called consistently, causing toggled-off players to still contribute to penalties.
        Core principle established: every data point should feed exactly ONE subsystem.</div>
        <span class="learning-tag bug">Ghost Calc Fix</span><span class="learning-tag model">Engine Integrity</span>
      </div>

      <div class="learning-entry milestone">
        <div class="learning-phase">Phase 7 — Fatigue Monitor</div>
        <div class="learning-title">5-Factor Fatigue System with Low-Confidence Discount</div>
        <div class="learning-body">Built <strong>calcPlayerFatigue()</strong> with five evidence-based factors:
        (1) <strong>Age Factor</strong>: Players 33+ accumulate fatigue faster (research shows recovery time increases ~12% per year after 32).
        (2) <strong>Minutes Load</strong>: Players averaging 36+ MPG carry compounding fatigue into later rounds.
        (3) <strong>Active Injury</strong>: Players playing through documented injuries fatigue faster (NEW — see activeInjury system).
        (4) <strong>Mental Fatigue</strong>: High-usage primary ball handlers (USG 28%+) face cognitive load degradation.
        (5) <strong>Role-Based Load</strong>: Defensive anchors who also carry offensive burden fatigue disproportionately.
        All factors are multiplied by a <strong>0.5 low-confidence discount</strong> because fatigue modeling in basketball is inherently speculative — academic research shows fatigue explains only ~8-12% of performance variance in playoff settings. The discount prevents the model from overweighting an uncertain signal.</div>
        <span class="learning-tag model">Fatigue</span><span class="learning-tag milestone">New System</span>
      </div>

      <div class="learning-entry milestone">
        <div class="learning-phase">Phase 7 — Active Injury System</div>
        <div class="learning-title">activeInjury: Tracking Players Playing Through Injuries</div>
        <div class="learning-body">Created a new per-player <strong>activeInjury</strong> object with fields: <strong>{type, severity, note}</strong>. This is conceptually distinct from injuryRisk (which models future breakdown probability for Health Degradation). activeInjury tracks players who ARE currently playing through documented injuries — their fatigue accumulates faster because compromised biomechanics increase energy expenditure.
        Formula: <strong>injFatigue = severity × 0.15 × (1 + gamesPlayed × 0.2) × (1 + depth × 0.25)</strong>.
        Currently tracking <strong>11 players</strong>: Anthony Edwards (knee management, 0.6), Jamal Murray (chronic knee, 0.7), Jalen Williams (wrist + hamstring, 0.6), Cade Cunningham (collapsed lung recovery, 0.5), Jayson Tatum (returning from injury, 0.4), Jarrett Allen (knee tendonitis, 0.4), Victor Wembanyama (rib contusion, 0.3), Shaedon Sharpe (fibula stress reaction, 0.4), Kevin Durant (knee contusion, 0.5), Grayson Allen (hamstring strain, 0.4), and Payton Pritchard (plantar fasciitis, 0.2).
        The Fatigue Monitor UI shows a bandage icon with injury type and severity for each affected player.</div>
        <span class="learning-tag model">Injury Model</span><span class="learning-tag data">Active Injuries</span>
      </div>

      <div class="learning-entry correction">
        <div class="learning-phase">Phase 8 — Roster Correction</div>
        <div class="learning-title">Lillard OUT for Season — Jrue Holiday Added to POR</div>
        <div class="learning-body">A critical roster error was caught: <strong>Damian Lillard was listed as active (rating 81)</strong> despite being out for the entire season with a torn left Achilles suffered in the 2025 playoffs. Lillard was traded back to Portland in the offseason but never played a game in 2025-26. His rating was set to 0 and <strong>Jrue Holiday</strong> (acquired from BOS for Anfernee Simons, Jul 2025) was added as POR's starting PG (rating 74).
        This required a cascade of updates: synergy lineups, coaching analysis, external factors, game predictions, betting picks, pedigree section, and all narrative references throughout the SAS-POR series. The lesson: always cross-reference offseason transactions with current-season availability, especially for players returning from major injuries. A model is only as good as its roster data.</div>
        <span class="learning-tag bug">Data Fix</span><span class="learning-tag data">Roster</span>
      </div>

      <div class="learning-entry milestone">
        <div class="learning-phase">Phase 8 — UI Overhaul</div>
        <div class="learning-title">Horizontal Layout with Round → Series → Game Navigation</div>
        <div class="learning-body">Rebuilt the entire UI from vertical scrolling to a <strong>horizontal tabbed layout</strong>. Navigation now flows: <strong>Round tabs → Series sub-tabs → Game sub-sub-tabs</strong>, with each game's analysis fitting a single viewport. Added visual stat bars for team comparisons, team toggle tabs for Player Ratings (replacing a single combined table), and responsive grid layouts. The goal was to make the tool feel like an interactive dashboard rather than a long document — critical for making quick pre-game checks during the actual playoffs.</div>
        <span class="learning-tag milestone">UI</span><span class="learning-tag model">UX Design</span>
      </div>

      <div class="learning-entry insight">
        <div class="learning-phase">Phase 9 — USA Today Injury Report</div>
        <div class="learning-title">Live Injury Data Integration via Chrome Research</div>
        <div class="learning-body">Used Claude in Chrome to read the <strong>USA Today NBA injury report</strong> for all 16 playoff teams, cross-referencing against existing model data. Key corrections:
        (1) <strong>Joel Embiid</strong> changed from rating 55 (limited) to <strong>0 (OUT)</strong> — illness post-appendectomy, expected return Apr 24 (~G3).
        (2) <strong>Kevin Durant</strong> confirmed OUT for G1 with right knee contusion, expected return Apr 21 (G2).
        (3) <strong>Grayson Allen</strong> added activeInjury for left hamstring strain (GTD, severity 0.4).
        (4) <strong>Payton Pritchard</strong> added activeInjury for plantar fasciitis (severity 0.2).
        (5) <strong>Immanuel Quickley</strong> set to OUT G1 (right hamstring strain).
        (6) <strong>Jock Landale</strong> confirmed OUT (right ankle sprain, expected May 1).
        (7) <strong>Paul George</strong> rating upgraded 68→72 based on strong post-suspension form (21.0 PPG, 41.5% from 3 in 10 games).
        Lesson: injury reports are the highest-leverage data source for game-day accuracy. A single OUT designation can swing win probability by 10-20%.</div>
        <span class="learning-tag data">Injury Report</span><span class="learning-tag model">Live Updates</span>
      </div>

      <div class="learning-entry insight">
        <div class="learning-phase">Phase 9 — Coaching Adjustments</div>
        <div class="learning-title">Injury-Driven Role Changes and Coaching Adaptations</div>
        <div class="learning-body">With major injuries confirmed, several coaching adjustments were factored in:
        <strong>HOU without KD (G1)</strong>: Ime Udoka likely runs smaller, faster lineups with Jalen Green and Amen Thompson getting elevated roles. HOU's offense drops significantly but their defensive identity (2nd in DRTG) remains intact.
        <strong>PHI without Embiid (G1-G2+)</strong>: Nick Nurse forced to go small-ball with Paul George as primary option. Tyrese Maxey's usage skyrockets. PHI's paint presence evaporates against NYK's physicality.
        <strong>POR without Lillard</strong>: Chauncey Billups builds around Jrue Holiday's two-way steadiness rather than Lillard's explosive creation. More balanced, less star-dependent system.
        <strong>BOS with Tatum returning</strong>: Joe Mazzulla managing minutes carefully — Tatum's activeInjury (0.4 severity) reflects controlled reintegration after Achilles recovery.
        These adjustments affect systemBonus values, rotation depth assumptions, and qualitative confidence levels in predictions.</div>
        <span class="learning-tag data">Coaching</span><span class="learning-tag model">Role Changes</span>
      </div>

      <div class="learning-entry insight">
        <div class="learning-phase">Phase 9 — Methodology</div>
        <div class="learning-title">activeInjury vs injuryRisk: Two Distinct Systems, Zero Overlap</div>
        <div class="learning-body">A key architectural decision was confirmed through the ghost audit: <strong>activeInjury</strong> and <strong>injuryRisk</strong> are conceptually and computationally separate.
        <strong>injuryRisk</strong> (0-1.0) feeds the <strong>Health Degradation Curve</strong> in calcTeamRating(): it models the probability of a player breaking down as a series goes deeper (R2+ only). Formula: injuryRisk × depth × 0.4 reduction to team rating.
        <strong>activeInjury.severity</strong> feeds <strong>calcPlayerFatigue()</strong>: it models the increased energy cost of playing through a current, documented injury. Formula: severity × 0.15 × game/depth compounding.
        These are NOT the same thing: a player can have high injuryRisk but no activeInjury (e.g., an aging player with no current injury), or high activeInjury.severity but low injuryRisk (e.g., a young player playing through a one-time contusion). Keeping them separate avoids the ghost calculation trap of penalizing the same concept twice through different pathways.</div>
        <span class="learning-tag model">Architecture</span><span class="learning-tag bug">Ghost Prevention</span>
      </div>

      <div class="learning-entry insight">
        <div class="learning-phase">Phase 10 — Offensive Style Research</div>
        <div class="learning-title">Partnow Offensive Style Framework Integrated (The Athletic, 2020)</div>
        <div class="learning-body">Integrated findings from Seth Partnow's two-part offensive style analysis using Synergy play type data (2004-2020). Three key model enhancements:
        (1) <strong>Initiator Redundancy</strong>: Teams with multiple active on-ball creators (Shot Creator / Primary Ball Handler roles) are more resilient and harder to scout. Teams with 3+ active initiators get a +0.5 bonus (CLE, OKC, BOS). Teams that lose their primary creator below expected levels get a -0.8 penalty — capturing the Partnow "initiator-loss cascade" where the entire offense loses its ability to generate efficient off-ball opportunities.
        (2) <strong>Offensive Style Diversity</strong>: Each team now has an <strong>offStyle</strong> descriptor and <strong>initiators</strong> count. Partnow's Euclidean distance analysis showed that stylistically distinctive teams (outliers) are harder to scout — DEN's Jokic-centric post-up/handoff system and SAS's Wembanyama unicorn creation are genuine outliers in the modern P&R-dominated league.
        (3) <strong>Turnover Attribution Insight</strong>: High on-ball turnover rates partly reflect the VALUE being created for teammates, not just inefficiency. Playmakers like Brunson, SGA, and Mitchell absorb the risk of the creation process. This validates our On/Off weighting and explains why high-turnover games from primary initiators don't necessarily signal poor play.
        The initiator redundancy bonus is NOT a ghost of the replacement-level slot system: slots capture individual production loss, while this captures systemic coherence loss — the offense can't create quality shots for ANYONE when the primary creator is gone.</div>
        <span class="learning-tag model">Offensive Style</span><span class="learning-tag data">Partnow Research</span>
      </div>

      <div class="learning-entry milestone">
        <div class="learning-phase">Phase 9 — Game 1 Results</div>
        <div class="learning-title">Saturday R1 Game 1s: Home Teams Sweep 4-0</div>
        <div class="learning-body">All four Saturday Game 1s were won by the home team:
        <strong>CLE def TOR</strong>, <strong>DEN def MIN</strong>, <strong>NYK def ATL</strong>, and <strong>LAL def HOU</strong>.
        This validates the R1 HCA of +3.0 — home court matters most in Round 1 when travel, crowd energy, and routine disruption are at their peak. WPA data was added for key players in each game. The 4-0 home sweep also supports the model's bounce-back qualifier design: Game 2 adjustments by losing teams will be the first real test of whether our coaching adjustment factors are calibrated correctly.</div>
        <span class="learning-tag data">Results</span><span class="learning-tag model">HCA Validated</span>
      </div>

      <div class="learning-entry milestone">
        <div class="learning-phase">Phase 11 — 2024 Backtest (Overview)</div>
        <div class="learning-title">Full 2024 Playoff Backtest: 52/82 Games = 63.4% Accuracy</div>
        <div class="learning-body">Applied the model retroactively to all 82 games of the 2024 NBA Playoffs using 2023-24 regular season team profiles. Accuracy by round: <strong>R1: 62.8% (27/43) → R2: 64.0% (16/25) → CF: 55.6% (5/9) → Finals: 80.0% (4/5)</strong>.
        Series winner predictions: <strong>11/15 correct (73.3%)</strong> — correctly called OKC, DEN, MIN, DAL, BOS, CLE, BOS(R2), IND(R2), BOS(CF), BOS(Finals), MIN(R2). Missed MIL-IND (predicted MIL), NYK-PHI (predicted PHI), OKC-DAL (predicted OKC), and MIN-DAL CF (predicted MIN).
        Compared to the 2025 backtest (73.5% game accuracy), the 2024 results were 10 points lower, primarily driven by two catastrophic series misses: NYK-PHI (2/6 = 33%) and MIL-IND (2/6 = 33%). Both exposed the same blindspot: the model overvalues individual talent ratings and undervalues system matchup dynamics and playoff culture.</div>
        <span class="learning-tag backtest">2024 Backtest</span><span class="learning-tag milestone">Milestone</span>
      </div>

      <div class="learning-entry insight">
        <div class="learning-phase">Phase 11 — 2024 Backtest (Round 1)</div>
        <div class="learning-title">R1: 62.8% — Sweeps Nailed, Upsets Missed</div>
        <div class="learning-body">The model excelled on lopsided matchups: <strong>OKC-NOP (4/4), MIN-PHX (4/4), DEN-LAL (4/5), BOS-MIA (4/5)</strong> — dominant favorites were easy to call. But it collapsed on competitive series:
        <strong>NYK-PHI (2/6)</strong>: The model favored PHI because Embiid (rated 78 with meniscus) + Maxey gave PHI higher individual ratings. But NYK was missing Randle AND Robinson, yet won 4-2. Brunson averaged 32.4 PPG and the Knicks' depth — Hart, DiVincenzo, and Hartenstein — outperformed their regular-season ratings by 15-20%. The model can't capture "playoff culture" or a player like Brunson ascending beyond his regular-season profile.
        <strong>MIL-IND (2/6)</strong>: The model backed Giannis + Lillard's individual talent (84 vs 80 team rating). But Indiana's <strong>pace-and-space system</strong> (103.2 pace, 121.5 ORTG) was a structural counter to Milwaukee's half-court-dependent offense. Haliburton's playmaking unlocked open looks that neutralized Milwaukee's defensive scheme. Lesson: systemBonus should scale with matchup specificity, not just generic coaching quality.</div>
        <span class="learning-tag backtest">2024 Backtest</span><span class="learning-tag model">R1 Analysis</span>
      </div>

      <div class="learning-entry correction">
        <div class="learning-phase">Phase 11 — 2024 Backtest (Round 1)</div>
        <div class="learning-title">Key R1 Lesson: "Playoff Brunson" Phenomenon — Stars Can Exceed Regular-Season Ceilings</div>
        <div class="learning-body">Jalen Brunson averaged 27.8 PPG in the regular season, but exploded to 32.4 PPG in the playoffs — a <strong>+4.6 PPG jump</strong> that our model had no mechanism to capture. Similarly, Tyrese Haliburton's playoff passing and IND's team-wide shooting upgrades represented a systemic playoff leap.
        The current model treats regular-season ratings as fixed ceilings. But some players — particularly primary ball handlers with playoff experience and high basketball IQ — have a "playoff gear" that elevates them beyond their regular-season production. This is distinct from starCeiling (which models variance/upside in individual games); this is a <strong>sustained elevation across an entire playoff run</strong>.
        Potential fix: a "playoff ascension" modifier for players with documented history of playoff performance exceeding regular-season baselines. Examples: Jimmy Butler (+5 PPG in 2023 playoffs), Jalen Brunson (+4.6 in 2024), Luka Doncic (+3.2 in 2024).</div>
        <span class="learning-tag model">Playoff Ascension</span><span class="learning-tag backtest">New Concept</span>
      </div>

      <div class="learning-entry insight">
        <div class="learning-phase">Phase 11 — 2024 Backtest (Round 2)</div>
        <div class="learning-title">R2: 64.0% — NYK's Injury Resilience Broke the Model</div>
        <div class="learning-body">The biggest R2 story was <strong>NYK-IND</strong>: the model gave IND an 88% win probability per game because NYK was missing Randle, Robinson, AND OG Anunoby (NYK's rating dropped to 65 vs IND's 80). Yet NYK won Games 1, 2, and 5 at home before eventually losing in 7.
        The model rated NYK at 65 — essentially a lottery team — because the replacement-level slot system correctly penalizes losing three starters. But the Knicks' "next man up" culture meant role players like Daquan Jeffries and Miles McBride produced above replacement level, and Brunson's 32+ PPG creation kept the offense functional.
        <strong>MIN-DEN (5/7)</strong> was the model's best R2 series — both teams rated 86, so HCA decided most games correctly. The G6 blowout (MIN 115-70) was unpredictable but the model's coin-flip assessment was essentially correct.
        <strong>BOS-CLE (4/5)</strong> and <strong>OKC-DAL (3/6)</strong> showed the familiar pattern: dominant favorites lose exactly one game to a motivated underdog, and the model can't pick WHICH game that happens.</div>
        <span class="learning-tag backtest">2024 Backtest</span><span class="learning-tag model">R2 Analysis</span>
      </div>

      <div class="learning-entry correction">
        <div class="learning-phase">Phase 11 — 2024 Backtest (Round 2)</div>
        <div class="learning-title">Key R2 Lesson: Replacement-Level Floor is Too Low for Deep Playoff Teams</div>
        <div class="learning-body">The REPLACEMENT_LEVEL of 42 is calibrated for regular-season production. But in the playoffs, teams that lose starters don't actually plug in G-League-caliber replacements — they elevate their 7th-10th men into larger roles, and these players often have <strong>playoff experience</strong> and <strong>coaching preparation</strong> that generic replacement-level doesn't capture.
        NYK's 2024 run (deep into R2 without 3 starters) suggests the replacement-level floor should be higher in playoff contexts — perhaps 48-52 instead of 42 — because playoff rotations are shorter and coaches optimize lineups for the specific matchup.
        However, this needs to be balanced carefully: the replacement-level system correctly predicted that NYK would eventually lose the series (IND won in 7), just not the per-game margins.</div>
        <span class="learning-tag model">Replacement Level</span><span class="learning-tag backtest">Calibration</span>
      </div>

      <div class="learning-entry insight">
        <div class="learning-phase">Phase 11 — 2024 Backtest (Conference Finals)</div>
        <div class="learning-title">CF: 55.6% — Dallas Over Minnesota Was the Model's Biggest Miss</div>
        <div class="learning-body">The model's worst series: <strong>MIN-DAL CF (1/5 correct)</strong>. Minnesota was rated 86 vs Dallas's 81, and with Round 1 HCA of 1.5, the model gave MIN a 70% win probability. Dallas won 4-1.
        Why the model failed: (1) <strong>Luka-Kyrie synergy</strong> was greater than the sum of parts — two elite shot creators who could alternate carrying the offense created an unscoutable attack that our initiator model doesn't fully capture. (2) <strong>Dallas's defensive transformation</strong> under Jason Kidd — DAL held MIN to 105, 108, 107, 100, and 103 PPG, well below MIN's 115.8 ORTG. The model's advStats are based on regular-season offense, not playoff defensive adjustment capability. (3) <strong>Anthony Edwards' inconsistency</strong> — Edwards averaged 22.6 PPG on 41% FG in the WCF, well below his 25.9 regular-season average. The model's starCeiling captures upside but not downside volatility.
        <strong>BOS-IND (4/4)</strong> was the bright spot — the model nailed the sweep, correctly identifying BOS as overwhelmingly superior (94 vs 80 rating).</div>
        <span class="learning-tag backtest">2024 Backtest</span><span class="learning-tag model">CF Analysis</span>
      </div>

      <div class="learning-entry correction">
        <div class="learning-phase">Phase 11 — 2024 Backtest (Conference Finals)</div>
        <div class="learning-title">Key CF Lesson: Two-Star Offensive Synergy Multiplier</div>
        <div class="learning-body">Dallas's Luka + Kyrie pairing exposed a gap in the model: when two elite shot creators share the floor, they create a <strong>multiplicative effect</strong> on offensive efficiency. If one is doubled, the other operates 1-on-1 in space. If the defense plays straight up, either can create from isolation.
        Our initiator redundancy system awards a flat +0.5 for 3+ initiators, but doesn't account for the QUALITY of those initiators. Having Luka (95) + Kyrie (85) as dual creators is qualitatively different from having three 70-rated ball handlers. The "sum of parts" model undervalues elite two-man games.
        Potential fix: a <strong>star-pair synergy bonus</strong> that triggers when a team has 2+ players rated 85+ with Shot Creator or Primary Ball Handler roles. This would have boosted DAL by ~1.5-2.0 points and potentially flipped the MIN-DAL prediction.
        This also retroactively explains why BOS (Tatum 92 + Brown 86 + Porzingis 83 + White 76) dominated — they had the deepest star-caliber rotation in the league.</div>
        <span class="learning-tag model">Star Synergy</span><span class="learning-tag backtest">New Concept</span>
      </div>

      <div class="learning-entry insight">
        <div class="learning-phase">Phase 11 — 2024 Backtest (Finals)</div>
        <div class="learning-title">Finals: 80.0% — Model's Best Round, BOS Dominance Correctly Predicted</div>
        <div class="learning-body">The model went <strong>4/5 in the Finals</strong>, correctly identifying Boston as heavy favorites (91% per game). BOS won 4-1, with the only miss being DAL's G4 blowout (122-84) — Dallas's "one explosion game" before elimination.
        This validates the model's core architecture for matchups with clear talent/system disparities. BOS's 94 team rating vs DAL's 81 was a 13-point gap — the largest in any Finals matchup — and the model correctly converted this to a 91% per-game probability.
        The G4 miss is the familiar "one mandatory upset game" pattern seen throughout the backtest: underdogs with elite stars (Luka) reliably produce 1-2 transcendent performances per series that are essentially unpredictable. The model shouldn't try to predict which specific game this happens — it should accept ~80% accuracy as the ceiling for dominant-vs-inferior matchups.</div>
        <span class="learning-tag backtest">2024 Backtest</span><span class="learning-tag model">Finals Analysis</span>
      </div>

      <div class="learning-entry milestone">
        <div class="learning-phase">Phase 11 — 2024 Backtest (Synthesis)</div>
        <div class="learning-title">Cross-Playoff Analysis: 2024 vs 2025 Backtest Comparison</div>
        <div class="learning-body">Comparing the two backtests reveals structural patterns:
        <strong>2025 Backtest: 36/49 (73.5%)</strong> — R1: 87.5%, R2: 69.6%, CF: 72.7%, Finals: 71.4%
        <strong>2024 Backtest: 52/82 (63.4%)</strong> — R1: 62.8%, R2: 64.0%, CF: 55.6%, Finals: 80.0%
        The 2024 backtest was harder because: (1) More competitive R1 series (2024 had MIL-IND, NYK-PHI, DAL-LAC as 50/50 matchups vs 2025's more lopsided R1). (2) More injuries disrupting regular-season profiles (NYK lost 3 starters). (3) The 2024 playoffs featured more "system > talent" upsets (IND over MIL, DAL over OKC/MIN) than the 2025 playoffs.
        <strong>Series winner accuracy was identical</strong>: 73.3% in 2024 (11/15) vs ~75% in 2025. This suggests the model's macro-level team assessment is solid, but per-game prediction is inherently noisy — home court, hot/cold shooting nights, and momentum shifts create game-level variance that statistical models can't fully capture.
        Combined across both playoffs: <strong>88/131 games = 67.2% accuracy, 11/15 + series = ~75% series accuracy</strong>.</div>
        <span class="learning-tag backtest">Cross-Year Analysis</span><span class="learning-tag milestone">Synthesis</span>
      </div>

      <div class="learning-entry correction">
        <div class="learning-phase">Phase 11 — 2024 Backtest (New Concepts)</div>
        <div class="learning-title">Four New Model Concepts Implemented from 2024 Backtest</div>
        <div class="learning-body">The 2024 backtest identified four model enhancements, now fully integrated into the live engine:
        (1) <strong>Playoff Ascension Modifier</strong>: Some players consistently elevate beyond regular-season ceilings in playoffs (Brunson +4.6 PPG, Butler +5 PPG, Luka +3.2 PPG). A per-player "playoff gear" field could capture this sustained elevation.
        (2) <strong>Star-Pair Synergy Bonus</strong>: Two 85+ rated shot creators sharing the floor create a multiplicative offensive advantage the model doesn't capture. Luka+Kyrie, Tatum+Brown+Porzingis. Should trigger a +1.5-2.0 team rating bonus.
        (3) <strong>Playoff Replacement-Level Adjustment</strong>: The REPLACEMENT_LEVEL of 42 may be too low for playoff contexts where coaching optimization and shorter rotations elevate 8th-10th men above generic replacement value. Consider 48-52 for playoff simulations.
        (4) <strong>Matchup-Specific System Bonus</strong>: systemBonus is currently a fixed per-team value, but some systems are specifically effective against particular opponents (IND's pace-and-space vs MIL's half-court scheme). A matchup matrix could improve series-level predictions.
        All four are now live in calcTeamRating() and calcWinProb(). Additionally, two ghost calculations were fixed during integration: On/Off team aggregate (already in player ratings) and Pace+Depth absolute bonus (replaced by relative paceMatchup in calcWinProb).</div>
        <span class="learning-tag model">Implemented</span><span class="learning-tag backtest">2024 Lessons</span>
      </div>

    </div>
  </div>`;
}

function renderDefinitionsPage(el) {
  el.innerHTML = `
  <div class="page-content">
    <div class="page-header">Definitions & Glossary</div>
    <div class="page-subheader">Every metric, abbreviation, and model concept used in this analyzer — grouped by category with formulas where applicable.</div>

    <div class="def-category player">Player-Level Metrics</div>
    <div class="def-grid">
      <div class="def-card">
        <div class="def-term">Player Efficiency Rating <span class="def-abbr">PER</span></div>
        <div class="def-desc">A per-minute rating developed by John Hollinger that summarizes a player's statistical accomplishments. <strong>League average is 15.0.</strong> Accounts for positive contributions (points, assists, rebounds, steals, blocks) and negative ones (missed shots, turnovers, fouls). Used at 15% weight in our composite rating. Stars typically range 22-32; role players 10-16.</div>
      </div>
      <div class="def-card">
        <div class="def-term">True Shooting Percentage <span class="def-abbr">TS%</span></div>
        <div class="def-formula">TS% = PTS / (2 × (FGA + 0.44 × FTA))</div>
        <div class="def-desc">The most accurate measure of shooting efficiency, incorporating 2-pointers, 3-pointers, and free throws into a single number. <strong>League average is ~57%.</strong> Unlike FG%, it properly credits 3-point shooting and free throw generation. Used at 12% weight. Elite scorers hit 62%+; league-best approach 67%.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Estimated Plus-Minus <span class="def-abbr">EPM</span></div>
        <div class="def-desc">The <strong>most predictive single metric</strong> for playoff performance, developed by Dunne et al. EPM estimates how many points per 100 possessions a player adds to their team, adjusted for teammates and opponents using regularized adjusted plus-minus. <strong>League average is 0.0.</strong> Given 18% weight — the highest in our model — because it captures both offense and defense with lineup context. MVP-caliber players reach 7-10; solid starters sit at 1-3.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Box Plus-Minus <span class="def-abbr">BPM</span></div>
        <div class="def-desc">A box-score estimate of the points per 100 possessions that a player contributed above a league-average player, translated to an average team. <strong>League average is 0.0.</strong> Uses only box score stats (no lineup data), making it less predictive than EPM but available for all players. Used at 15% weight. All-Stars typically range 4-8; MVPs hit 8-12.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Win Shares per 48 Minutes <span class="def-abbr">WS/48</span></div>
        <div class="def-formula">WS/48 = Win Shares / (Minutes Played / 48)</div>
        <div class="def-desc">An estimate of the number of wins contributed by a player per 48 minutes. <strong>League average is ~0.100.</strong> Developed by Basketball-Reference, it translates all box-score contributions into "wins." Used at 12% weight. Elite players reach 0.200+; replacement level is ~0.000.</div>
      </div>
      <div class="def-card">
        <div class="def-term">On/Off Rating <span class="def-abbr">On/Off</span></div>
        <div class="def-desc">The difference in team net rating when a player is <strong>on the court vs. off the court</strong>. A +6.0 means the team outscores opponents by 6 more points per 100 possessions with that player. This captures "gravity" and defensive presence that box scores miss. Used at 10% weight. +8 or higher signals a franchise-altering player.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Clutch Rating <span class="def-abbr">Clutch</span></div>
        <div class="def-desc">A composite of a player's performance in <strong>clutch situations</strong> — defined as the final 5 minutes of games within 5 points. Factors in clutch FG%, free throw rate, turnover rate, and plus-minus. Scale of 1-10. Used at 10% weight because playoffs are disproportionately decided in close endgames. Elite closers (LeBron, SGA) rate 8+.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Usage Rate <span class="def-abbr">USG%</span></div>
        <div class="def-formula">USG% = 100 × (FGA + 0.44 × FTA + TOV) × (Tm MP / 5) / (MP × Tm Poss)</div>
        <div class="def-desc">The percentage of team plays used by a player while on the floor. <strong>League average is 20%.</strong> Used for contextual adjustment (8% weight) — high-usage players on efficient scoring are rated higher, while high-usage inefficient players are penalized. Primary scorers range 28-35%.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Value Over Replacement Player <span class="def-abbr">VORP</span></div>
        <div class="def-desc">A cumulative statistic that estimates the <strong>total points per 100 team possessions a player contributes above a replacement-level player</strong>, scaled to an 82-game season. Based on BPM and playing time. <strong>League average is ~1.0.</strong> Identified by Yla-Autio (2022) as the single most important advanced metric for predicting NBA outcomes. MVP-caliber players reach 6-10; solid starters sit at 2-4. Used in our VORP aggregation bonus in calcTeamRating().</div>
      </div>
      <div class="def-card">
        <div class="def-term">LEBRON <span class="def-abbr">LEBRON</span></div>
        <div class="def-desc"><strong>Luck-adjusted player Estimate using a Box prior Regularized ON-off</strong> (BBall Index). A composite metric combining box-score priors with lineup-adjusted plus-minus, corrected for luck. <strong>0.0 = league average; -2.7 = replacement level.</strong> More predictive than raw plus-minus because it stabilizes noisy lineup data with box-score anchoring. MVP-caliber players reach 4.0+; elite starters sit at 2.0-3.5. Split into O-LEBRON (offensive) and D-LEBRON (defensive) components.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Offensive LEBRON <span class="def-abbr">O-LEBRON</span></div>
        <div class="def-desc">The offensive component of LEBRON, isolating a player's scoring, playmaking, and spacing impact with lineup adjustments. <strong>0.0 = average.</strong> High O-LEBRON players (2.5+) are elite offensive engines. Used alongside OffRole classification to understand HOW a player contributes offensively (Shot Creator, Primary Ball Handler, Movement Shooter, etc.).</div>
      </div>
      <div class="def-card">
        <div class="def-term">Defensive LEBRON <span class="def-abbr">D-LEBRON</span></div>
        <div class="def-desc">The defensive component of LEBRON, isolating a player's rim protection, perimeter defense, and help defense impact. <strong>0.0 = average.</strong> Positive D-LEBRON indicates above-average defensive impact. Used in our D-LEBRON team aggregate bonus (calcTeamRating) and D-LEBRON matchup differential (calcWinProb). Paired with DefRole classification: Anchor Big, Wing Stopper, Point of Attack, Mobile Big, Helper, Chaser, Low Activity.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Wins Above Replacement <span class="def-abbr">WAR</span></div>
        <div class="def-desc">LEBRON's cumulative value metric — estimates <strong>total wins a player adds above replacement level</strong> over a season. Complementary to VORP but uses LEBRON's lineup-adjusted methodology rather than box-score BPM. <strong>Average starter ~4.0; MVP-caliber 10+.</strong> Used in our WAR aggregation bonus: teams with total active WAR above 35 get a rating boost, below 35 get penalized. Captures lineup-adjusted value that box-score VORP may miss.</div>
      </div>
    </div>

    <div class="def-category team" style="margin-top:28px">Team-Level Metrics</div>
    <div class="def-grid">
      <div class="def-card">
        <div class="def-term">Offensive Rating <span class="def-abbr">ORtg</span></div>
        <div class="def-desc">Points scored <strong>per 100 possessions</strong>. The standard measure of offensive efficiency, removing pace bias. <strong>League average is ~113.</strong> Elite offenses reach 118+. Better than raw points-per-game because it accounts for how fast a team plays.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Defensive Rating <span class="def-abbr">DRtg</span></div>
        <div class="def-desc">Points allowed <strong>per 100 possessions</strong>. The standard measure of defensive efficiency. <strong>League average is ~113.</strong> Elite defenses allow 108 or fewer. Lower is better. Combined with ORtg, it gives the full picture of team quality.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Net Rating <span class="def-abbr">NetRtg</span></div>
        <div class="def-formula">NetRtg = ORtg - DRtg</div>
        <div class="def-desc">The <strong>single best predictor of team quality</strong> — the difference between points scored and points allowed per 100 possessions. <strong>League average is 0.0.</strong> A +10 NetRtg (like OKC's +11.6) indicates historically dominant team. Championship teams typically have NetRtg +5 to +12.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Clutch Net Rating <span class="def-abbr">ClutchNetRtg</span></div>
        <div class="def-desc">Team Net Rating in <strong>clutch situations</strong> (final 5 minutes, within 5 points). Measures how well a team performs when games are on the line. HOU's -2.8 clutch NetRtg flagged their closing problems; OKC's +8.5 confirmed their elite ability to finish games. More predictive for playoff success than overall NetRtg.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Pace <span class="def-abbr">Pace</span></div>
        <div class="def-desc">The number of <strong>possessions per 48 minutes</strong>. <strong>League average is ~99.</strong> Fast teams (pace 102+) create more variance and scoring opportunities, which historically benefits underdogs. Slow teams (pace 96-) control games through half-court execution, which benefits favorites.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Effective Field Goal Percentage <span class="def-abbr">eFG%</span></div>
        <div class="def-formula">eFG% = (FGM + 0.5 × 3PM) / FGA</div>
        <div class="def-desc">Adjusts FG% to account for the extra value of three-pointers. A 3-pointer made is worth 1.5 times a 2-pointer in this formula. <strong>League average is ~53%.</strong> Better teams shoot 55%+ eFG; elite offenses reach 56-57%.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Turnover Rate <span class="def-abbr">TOV%</span></div>
        <div class="def-desc">Turnovers committed <strong>per 100 possessions</strong>. <strong>League average is ~13.</strong> Lower is better. In the playoffs, turnover rate becomes even more critical because the pace of play slows and each possession has outsized value. Teams below 12 have a significant edge.</div>
      </div>
    </div>

    <div class="def-category model" style="margin-top:28px">Model-Specific Concepts</div>
    <div class="def-grid">
      <div class="def-card">
        <div class="def-term">Home Court Advantage <span class="def-abbr">HCA</span></div>
        <div class="def-desc">The <strong>rating bonus given to the home team</strong> in our win probability formula. Originally a flat +3, now <strong>round-adjusted</strong> based on 2025 backtest data: R1 = +3.0, R2 = +2.0, CF = +1.5, Finals = +1.0. Road teams in later rounds are more prepared through film study and matchup familiarity, reducing the home edge. Game 7 override: +5.0 (home teams win ~78% of Game 7s historically).</div>
      </div>
      <div class="def-card">
        <div class="def-term">Replacement Level <span class="def-abbr">REPL</span></div>
        <div class="def-formula">REPLACEMENT_LEVEL = 48 (raised from 42 after 2024 backtest)</div>
        <div class="def-desc">The rating assigned to any roster slot where the player is inactive (injured or toggled out). Raised from 42 to 48 after the 2024 backtest showed playoff-context replacements are coached up and matchup-optimized — NYK competed in R2 missing 3 starters because their 8th-10th men played at ~50 level. The 48 floor ensures losing a star (rating 87+) still creates a realistic ~39-point gap in that slot while reflecting the higher baseline of playoff rotation players.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Win Probability Formula</div>
        <div class="def-formula">P(home) = 1 / (1 + 10^(-(homeRating + HCA - awayRating) / 15))</div>
        <div class="def-desc">A logistic function that converts the rating differential (including HCA) into a <strong>win probability between 0-100%</strong>. The divisor of 15 controls the sensitivity — a 15-point rating advantage gives ~75% win probability. Based on Elo-style systems used across major sports analytics.</div>
      </div>
      <div class="def-card">
        <div class="def-term">SPM Chemistry <span class="def-abbr">SPM</span></div>
        <div class="def-desc">Statistical Plus-Minus Chemistry model based on <strong>Maymin, Maymin &amp; Shen (2012)</strong>, expanded to v2 with 8 skill dimensions (adding 3-Point Shooting and Ball Distribution per Mateus et al. 2024). Profiles each player and calculates pairwise synergy using empirically-derived coefficients. Two elite scorers penalize each other (-0.826), while a scorer + ball-handler synergize (+0.412). New: shooters + passers (+0.350), two ball-dominant players (-0.650). Score of 50 = average; 75+ = elite chemistry.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Scenario Builder</div>
        <div class="def-desc">An <strong>interactive tool</strong> that lets users toggle players IN/OUT to see real-time win probability changes. Uses the same engine as the base model but with user-defined roster modifications. Ghost calculations are prevented by the <strong>isBaselineInjured / isScenarioToggled</strong> helper pattern that separates baseline state from user toggles.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Ghost Calculation</div>
        <div class="def-desc">A bug where <strong>already-injured players get double-penalized</strong> — once through their replacement-level slot (correct) and again through a secondary system like historical calibration or advanced stats scaling (incorrect). Ghost calculations make teams look weaker than they should. Fixed by always checking isBaselineInjured before applying secondary penalties.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Stat Differential Model <span class="def-abbr">StatDiff</span></div>
        <div class="def-formula">StatDiff = 0.4xFG%D + 0.25x3PT%D + 0.15xORB%D + 0.2xTOVD</div>
        <div class="def-desc">Based on <strong>Jones &amp; Magel (2016)</strong>, who found team-level stat differentials explain 91.45% of point spread variance. Their weighted model (70% stats + 30% point differential) achieved 80% playoff accuracy. We use FG%, 3PT%, offensive rebounding, and turnover differentials, capped at +/-3 points, added to the win probability formula.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Series-Stage Pressure <span class="def-abbr">PressureMod</span></div>
        <div class="def-desc">Based on <strong>Mateus et al. (2024)</strong>, who found player behavior changes significantly between first and last games of a series -- more perimeter shooting, conservative play, increased fouls, and ball movement shifts. Later-series games amplify the pedigree advantage of experienced teams. Elimination games (+0.5 modifier) and tied series in later games (+0.3) further shift probability toward teams with playoff DNA.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Non-Linear Interactions <span class="def-abbr">NLI</span></div>
        <div class="def-desc">Based on <strong>Yeung (2020)</strong>, whose Random Forest model (ROC-AUC 0.841) significantly outperformed linear regression (0.738), proving non-linear feature interactions matter. Our model captures two key interactions: (1) <strong>Shooting + Defense synergy</strong> -- teams elite at both 3PT% and DRtg get a compounding bonus, and (2) <strong>Pace + Depth</strong> -- fast-paced teams with quality bench players benefit from more rotation opportunities.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Enhanced SPM Chemistry v2 <span class="def-abbr">SPM v2</span></div>
        <div class="def-desc">Expanded from 6 to <strong>8 skill dimensions</strong> per player, adding <strong>3-Point Shooting (o3PT)</strong> and <strong>Ball Distribution (oPass)</strong>. Based on Mateus et al. (2024), who found touches and passes made were the strongest discriminators (structure coefficient 0.605) for player performance clusters. Key new synergies: shooters + passers (+0.350), two ball-dominant players (-0.650), scorer + shooter spacing (+0.295).</div>
      </div>
    </div>

    <div class="def-category backtest" style="margin-top:28px">Backtest-Calibrated Factors (New in v2)</div>
    <div class="def-grid">
      <div class="def-card">
        <div class="def-term">System Coherence Bonus <span class="def-abbr">systemBonus</span></div>
        <div class="def-desc">A per-team modifier (range <strong>-2 to +3</strong>) capturing how much a team's offensive/defensive system transcends individual player ratings. Indiana's pace-and-space system beat three teams with better individual talent in 2025. OKC (+2.5) and BOS (+2.0) have the highest values. Teams reliant on one star with no system get 0 or negative.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Playoff Pedigree <span class="def-abbr">playoffPedigree</span></div>
        <div class="def-desc">A per-team score (0-2) reflecting <strong>recent championship/deep-run experience</strong>. Teams with recent titles (OKC, DEN, BOS) get 2; deep playoff runs (MIN's 2024 WCF) get 1; no recent success gets 0. Adds up to +1.6 to team rating. Validated by Denver pushing OKC to 7 games despite being outmatched — championship DNA is real.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Star Ceiling Variance <span class="def-abbr">starCeiling</span></div>
        <div class="def-desc">A per-player score (0-2) for elite stars who produce <strong>games far above their baseline</strong> approximately once per series. Edwards' 143-team-point WCF G3, Jokic's 42/22 R2 G1 — these "ceiling games" can't be predicted but can be probabilistically expected. StarCeiling:2 players add +0.6 to their team's win probability through upside variance.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Offensive Style Profile <span class="def-abbr">offStyle / initiators</span></div>
        <div class="def-desc">Per-team fields based on <strong>Partnow's offensive style research</strong> (The Athletic, 2020). <strong>offStyle</strong> is a qualitative descriptor of a team's primary and secondary offensive actions (P&R, ISO, Post-Up, Motion, etc.). <strong>initiators</strong> counts the number of distinct on-ball creators (Shot Creator / Primary Ball Handler roles). Teams with 3+ active initiators get +0.5 bonus (offensive resilience and scouting difficulty). Teams that lose their primary creator below expected levels get -0.8 penalty (initiator-loss cascade — the offense loses ability to generate efficient off-ball opportunities for everyone). Based on Synergy play type data showing the on-ball/off-ball ratio is ~48/52 and that stylistically distinctive teams (Euclidean distance outliers) are harder to prepare for.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Playoff Ascension <span class="def-abbr">playoffAscension</span></div>
        <div class="def-formula">Team bonus = Σ(playoffAscension × 0.6) for active players</div>
        <div class="def-desc">A per-player modifier (range: -0.5 to 1.5) that captures whether a player <strong>consistently elevates beyond their regular-season ceiling in playoffs</strong>. Based on 2024 backtest findings: Jalen Brunson (+4.6 PPG in 2024 playoffs, 1.5), Jaylen Brown (Finals MVP elevated role, 1.0), Donovan Mitchell (proven playoff scorer, 1.0), LeBron James (playoff mode at 41, 1.0), Anthony Edwards (emerging playoff star, 0.8), Devin Booker (2023 Finals run, 0.8), Jayson Tatum (multi-year playoff pedigree, 0.8). Negative values for documented playoff underperformers: James Harden (-0.5, historically drops in playoffs). Distinct from starCeiling (which models single-game variance); this captures <strong>sustained per-series elevation</strong>.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Star-Pair Synergy <span class="def-abbr">eliteCreators</span></div>
        <div class="def-formula">+1.0 bonus when 2+ active players rated 85+ have Shot Creator or Primary Ball Handler roles</div>
        <div class="def-desc">When two elite shot creators share the floor, they create a <strong>multiplicative offensive advantage</strong>: if one is doubled, the other operates 1-on-1 in space. Based on 2024 backtest where Luka+Kyrie (DAL) dominated the WCF and Tatum+Brown (BOS) dominated the Finals. Distinct from initiator redundancy (which counts breadth of creation); this rewards the <strong>quality</strong> of the top creator pairing. Currently applies to BOS (Tatum 85 + Brown 88), and would apply to CLE (Mitchell 87 + Harden 80 — just below threshold) and others if injury returns elevate their stars.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Pace Matchup Differential <span class="def-abbr">paceMatchup</span></div>
        <div class="def-formula">Bonus = min(1.0, paceDiff × 0.15) for faster team if activeCount ≥ 8</div>
        <div class="def-desc">When two teams differ by 2+ points in pace, the faster team gets a <strong>matchup-specific bonus</strong> if they have a deep rotation (8+ active players). Based on 2024 backtest where Indiana's pace-and-space (103.2 pace) structurally countered Milwaukee's half-court scheme. Fast-paced teams with depth create more possessions, which amplifies their depth advantage. Capped at ±1.0 points in calcWinProb().</div>
      </div>
      <div class="def-card">
        <div class="def-term">Playoff Replacement Level <span class="def-abbr">REPLACEMENT_LEVEL</span></div>
        <div class="def-formula">REPLACEMENT_LEVEL = 48 (raised from 42)</div>
        <div class="def-desc">The rating assigned to roster slots where a player is injured or scenario-toggled out. Raised from 42 to 48 based on 2024 backtest findings: NYK competed in R2 missing 3 starters because playoff replacements are <strong>coached up and matchup-optimized</strong>, producing above generic replacement value. In playoff contexts, 7th-10th men benefit from shorter rotations, specific game-planning, and the defensive intensity that favors experienced role players. The raise from 42 to 48 reduces the penalty for losing starters by ~6 weighted points per slot while still maintaining meaningful injury impact.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Health Degradation Curve <span class="def-abbr">injuryRisk</span></div>
        <div class="def-formula">Penalty = injuryRisk × roundDepth × 0.4</div>
        <div class="def-desc">A per-player risk score (0-1.0) for players with <strong>known injury concerns</strong>. The penalty increases in later rounds (roundDepth: R1=0, R2=1, CF=2, Finals=3), reflecting cumulative toll. KD (0.7), Doncic (1.0), Murray (0.8) carry significant risk. Tatum's Achilles tear in 2025 R2 G4 validated this concept — his risk should have been flagged earlier.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Bounce-Back Probability <span class="def-abbr">BB%</span></div>
        <div class="def-formula">BB% = 0.77 × roundModifier - systemAdvantage × 0.05</div>
        <div class="def-desc">The probability that a home team <strong>wins Game 2 after losing Game 1</strong>. Baseline is 77% (from 2021-22 data: 10-1 record). Now qualified by round (R2: ×0.7, CF: ×0.5, Finals: ×0.4) and reduced when the opponent has a higher system coherence bonus. In R1, bounce-backs remain highly reliable; by the Finals, they drop to ~35%.</div>
      </div>
      <div class="def-card">
        <div class="def-term">Game 7 Override <span class="def-abbr">G7</span></div>
        <div class="def-desc">When the series is tied 3-3, HCA jumps to <strong>+5.0</strong> regardless of round. Home teams have won ~78% of Game 7s historically, and the 2025 playoffs confirmed this: OKC won G7 at home vs DEN (by 32) and vs IND in the Finals (by 12). The psychological and crowd advantage in a winner-take-all scenario is the strongest force in basketball.</div>
      </div>
    </div>

    <div class="def-category" style="margin-top:28px;background:linear-gradient(90deg,#4a3520,transparent);border-left:4px solid #d4a04a;">Fatigue Monitor (Low Confidence — Work in Progress)</div>
    <div class="def-grid">
      <div class="def-card" style="border-left:3px solid #d4a04a;">
        <div class="def-term">Fatigue Index <span class="def-abbr">FI</span></div>
        <div class="def-desc">A per-team composite metric (0.0-1.0 scale) estimating <strong>cumulative physical and mental fatigue</strong> across a playoff series. Derived from weighted average of individual player fatigue scores, with stars weighted more heavily. Teams with FI > 0.05 receive a rating penalty of up to ~2 points. <strong>LOW CONFIDENCE:</strong> fatigue effects are real but hard to quantify precisely — the model applies conservative estimates (halved from research maximums).</div>
      </div>
      <div class="def-card" style="border-left:3px solid #d4a04a;">
        <div class="def-term">Age Factor</div>
        <div class="def-desc">Players <strong>33 and older</strong> accumulate fatigue faster — 0.08 per year over 32, compounding in later rounds (+30% per round). Research shows older athletes have reduced recovery rates and greater cumulative performance decline across multi-game series. LeBron (40), CP3 (40), and similar veterans carry meaningful fatigue risk in deep runs.</div>
      </div>
      <div class="def-card" style="border-left:3px solid #d4a04a;">
        <div class="def-term">Mental Fatigue</div>
        <div class="def-desc">Based on Pageaux et al. and Smith et al.: mental fatigue <strong>reduces FT accuracy ~5% and decision-making ~6%</strong>. Modeled as 0.03 per game played, increasing 15% per round of depth. Primary ball handlers and shot creators carry additional mental load (+0.05). This component captures the "playoff grind" that doesn't show up in physical metrics.</div>
      </div>
      <div class="def-card" style="border-left:3px solid #d4a04a;">
        <div class="def-term">Minutes Load</div>
        <div class="def-desc">Players averaging <strong>36+ minutes per game</strong> show degraded performance across a series — particularly in 3PT accuracy (Oudejans et al.) and turnover rate (p=0.038). Penalty scales with games played (15% compounding per game). Heavy-minutes stars in long series (6-7 games) can lose up to 0.5 fatigue points from this factor alone.</div>
      </div>
      <div class="def-card" style="border-left:3px solid #d4a04a;">
        <div class="def-term">Active Injury <span class="def-abbr">activeInjury</span></div>
        <div class="def-desc">Per-player object tracking injuries a player is <strong>playing through</strong> (distinct from injuryRisk in Health Degradation). Fields: <strong>type</strong> (e.g. "knee management", "chronic knee"), <strong>severity</strong> (0-1 scale), and <strong>note</strong> (context). Severity feeds into fatigue calculation: base contribution of severity × 0.15, compounding +20% per game played and +25% per playoff round. This captures the reality that playing through injury causes cumulative toll — e.g. Edwards' knee worsens over a 7-game series even if he plays every game. Shown in fatigue monitor with a bandage icon and hover tooltip.</div>
      </div>
      <div class="def-card" style="border-left:3px solid #d4a04a;">
        <div class="def-term">Low Confidence Discount</div>
        <div class="def-desc">All fatigue calculations are <strong>multiplied by 0.5</strong> (halved) to reflect the uncertainty in translating lab-based fatigue research to real NBA playoff conditions. Players have recovery staff, days between games, and varying conditioning levels that lab studies don't capture. As more playoff data accumulates, this discount may be adjusted.</div>
      </div>
    </div>
  </div>`;
}
